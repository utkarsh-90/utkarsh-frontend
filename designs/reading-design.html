<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reading — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;width:100%;}
body{font-family:'Inter',system-ui,sans-serif;background:#f5f5f7;color:#0a0a0f;-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5;}

:root{
  --bg:#f5f5f7;--surface:#fff;
  --sidebar:#0d0d12;--sidebar-hover:#1a1a22;--sidebar-active:#1d4ed8;
  --t1:#0a0a0f;--t2:#5a5a66;--t3:#9a9aa6;
  --border:#e1e1e6;--border-s:#c8c8d0;
  --accent:#1d4ed8;--accent-h:#2563eb;--accent-lt:#eff4ff;
  --danger:#dc2626;--danger-lt:#fef2f2;
  --sb-w:220px;--tb-h:48px;
}

/* ─── SHELL ──────────────────────────────── */
.shell{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:var(--sb-w);flex-shrink:0;background:var(--sidebar);display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:none;}
.sidebar::-webkit-scrollbar{display:none;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{height:var(--tb-h);flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;justify-content:space-between;}
.content{flex:1;overflow-y:auto;padding:0 28px 48px;}

/* ─── SIDEBAR ─────────────────────────────── */
.sb-brand{padding:0 20px;height:var(--tb-h);display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,.06);}
.sb-brand-text{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#fff;}
.sb-brand-text span{color:var(--accent);margin-right:6px;}
.sb-sep{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.25);padding:18px 20px 6px;}
.sb-link{display:flex;align-items:center;gap:10px;padding:8px 20px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.55);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:color 80ms,background 80ms;position:relative;}
.sb-link:hover{background:var(--sidebar-hover);color:rgba(255,255,255,.85);}
.sb-link.active{background:var(--sidebar-active);color:#fff;}
.sb-link.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:#93c5fd;}
.sb-icon{width:14px;height:14px;flex-shrink:0;opacity:.7;}
.sb-link.active .sb-icon{opacity:1;}
.sb-badge{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;background:rgba(255,255,255,.12);color:rgba(255,255,255,.5);padding:1px 6px;}
.sb-link.active .sb-badge{background:rgba(255,255,255,.2);color:#fff;}

/* ─── TOPBAR ─────────────────────────────── */
.tb-title{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--t2);display:flex;align-items:center;gap:8px;}
.tb-title strong{color:var(--t1);}
.tb-sep{color:var(--border-s);}
.tb-right{display:flex;align-items:center;gap:16px;}
.tb-link{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;}

/* ─── BUTTONS ─────────────────────────────── */
.btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;padding:7px 14px;transition:background 80ms,color 80ms,border-color 80ms;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-h);}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--border-s);}
.btn-ghost:hover{border-color:var(--t2);color:var(--t1);}
.btn-sm{padding:4px 10px;font-size:9px;}
.btn-xs{padding:3px 8px;font-size:9px;}

/* ─── PAGE HEADER ─────────────────────────── */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;padding:24px 0 20px;flex-wrap:wrap;gap:12px;}
.ph-title{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--t1);}
.breadcrumb{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-top:4px;display:flex;align-items:center;gap:6px;}
.bc-link{color:var(--accent);cursor:pointer;background:none;border:none;padding:0;font:inherit;letter-spacing:inherit;}

/* ─── TABS ───────────────────────────────── */
.tabs-bar{display:flex;align-items:flex-end;border-bottom:1px solid var(--border);margin-bottom:0;gap:0;}
.tab-btn{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;
  letter-spacing:.09em;text-transform:uppercase;
  background:none;border:none;border-bottom:2px solid transparent;
  color:var(--t3);padding:8px 18px 12px;cursor:pointer;
  white-space:nowrap;transition:color 80ms;margin-bottom:-1px;
  display:flex;align-items:center;gap:7px;
}
.tab-btn:hover{color:var(--t1);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-count{
  font-size:9px;opacity:.7;
  background:var(--border);color:var(--t2);
  padding:1px 5px;font-family:'JetBrains Mono',monospace;
  transition:background 80ms,color 80ms;
}
.tab-btn.active .tab-count{background:var(--accent-lt);color:var(--accent);}

/* ─── LIST WRAPPER ───────────────────────── */
.reading-list-wrap{background:var(--surface);border:1px solid var(--border);border-top:none;}
.list-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px 9px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
}
.list-toolbar-left{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);display:flex;align-items:center;gap:8px;}
.list-toolbar-hint{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.06em;color:var(--t3);}

/* ─── ROW ────────────────────────────────── */
.reading-row{
  border-bottom:1px solid var(--border);
  transition:background 80ms;
  position:relative;
}
.reading-row:last-child{border-bottom:none;}
.reading-row.drag-over{border-top:2px solid var(--accent);background:var(--accent-lt);}
.reading-row.dragging{opacity:.35;}
.reading-row.expanded{background:#fafafe;}

/* Row collapsed line */
.row-collapsed{
  display:grid;
  grid-template-columns:16px 28px 1fr auto;
  gap:0 12px;
  align-items:center;
  padding:11px 16px 11px 12px;
  cursor:pointer;
  min-height:44px;
}
.row-collapsed:hover .row-drag{opacity:1;}
.row-collapsed:hover .row-del{opacity:1;}

/* Drag handle */
.row-drag{
  display:flex;flex-direction:column;gap:2px;align-items:center;justify-content:center;
  cursor:grab;opacity:0;transition:opacity 80ms;color:var(--border-s);
  padding:3px 2px;align-self:center;
}
.row-drag:active{cursor:grabbing;color:var(--accent);}
.drag-dot{width:3px;height:3px;border-radius:50%;background:currentColor;}
.row-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:.04em;text-align:right;user-select:none;}

/* Row main content (collapsed) */
.row-main{display:flex;align-items:center;gap:12px;min-width:0;flex:1;}
.row-title{font-size:14px;font-weight:600;color:var(--t1);letter-spacing:-.01em;flex-shrink:0;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.row-title.bounced{text-decoration:line-through;text-decoration-thickness:1px;text-decoration-color:var(--border-s);color:var(--t2);}
.row-author{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:.04em;flex-shrink:0;}
.row-format-tag{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;background:var(--bg);border:1px solid var(--border);color:var(--t3);padding:2px 7px;flex-shrink:0;}
.row-note-preview{font-size:12px;font-style:italic;color:var(--t3);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* Row actions */
.row-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.row-del{
  opacity:0;transition:opacity 80ms;
  background:none;border:none;cursor:pointer;
  color:var(--t3);padding:4px;display:flex;align-items:center;
}
.row-del:hover{color:var(--danger);}
.row-expanded-toggle{
  background:none;border:none;cursor:pointer;
  color:var(--t3);padding:4px;display:flex;align-items:center;
  transition:color 80ms,transform 80ms;
}
.row-expanded-toggle.open{color:var(--accent);transform:rotate(90deg);}
.reading-row:hover .row-del{opacity:1;}

/* ─── EXPANDED EDIT FORM ─────────────────── */
.row-expand{
  padding:14px 16px 16px 56px;
  border-top:1px solid var(--border);
  background:#fafafe;
  display:grid;
  grid-template-columns:2fr 1fr 80px 1fr;
  gap:10px 12px;
  align-items:start;
}
.row-expand.has-note{grid-template-columns:2fr 1fr 80px 1fr;}
.row-expand.bounced-form{grid-template-columns:2fr 1fr 80px 100px;}
.expand-field{display:flex;flex-direction:column;gap:5px;}
.expand-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);}
.expand-input{
  font-family:'Inter',sans-serif;font-size:13px;color:var(--t1);
  background:var(--surface);border:1px solid var(--border);
  padding:6px 9px;outline:none;transition:border-color 80ms;width:100%;
}
.expand-input:focus{border-color:var(--accent);}
.expand-input::placeholder{color:var(--t3);}
.expand-select{
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;
  background:var(--surface);border:1px solid var(--border);
  color:var(--t1);padding:6px 8px;outline:none;width:100%;
  appearance:none;cursor:pointer;
}
.expand-select:focus{border-color:var(--accent);}
.expand-textarea{
  font-family:'Inter',sans-serif;font-size:13px;color:var(--t1);
  background:var(--surface);border:1px solid var(--border);
  padding:7px 9px;outline:none;resize:vertical;min-height:60px;
  line-height:1.5;transition:border-color 80ms;width:100%;
}
.expand-textarea:focus{border-color:var(--accent);}
.expand-textarea::placeholder{color:var(--t3);}
.expand-full-row{
  grid-column:1/-1;
  display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end;
}
.expand-actions{display:flex;align-items:center;gap:6px;padding-bottom:2px;}
.char-hint{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);letter-spacing:.04em;margin-top:3px;}

/* ─── ADD ITEM ROW ───────────────────────── */
.add-row{
  padding:10px 16px;
  border-top:1px solid var(--border);
}
.add-btn{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;
  background:none;border:1px dashed var(--border-s);
  color:var(--t3);cursor:pointer;padding:7px 16px;
  width:100%;display:flex;align-items:center;justify-content:center;gap:7px;
  transition:border-color 80ms,color 80ms;
}
.add-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ─── EMPTY STATE ─────────────────────────── */
.empty-state{
  padding:40px 20px;text-align:center;
  font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:.08em;text-transform:uppercase;color:var(--t3);
}

/* ─── TOAST ──────────────────────────────── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--t1);color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:10px 20px;display:flex;align-items:center;gap:8px;z-index:9999;animation:toastIn 200ms ease both;}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.toast-dot{width:6px;height:6px;background:#4ade80;border-radius:50%;flex-shrink:0;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useId } = React;

/* ─── DATA ───────────────────────────────── */
let _id = 100;
const uid = () => ++_id;

const INIT = {
  current: [
    {id:1,title:"The Alignment Problem",author:"Brian Christian",year:"2020",format:"book",note:"Better than most technical AI safety writing because it takes the human side seriously."},
    {id:2,title:"Antifragile",author:"Nassim Nicholas Taleb",year:"2012",format:"book",note:""},
    {id:3,title:"The Technological Society",author:"Jacques Ellul",year:"1964",format:"book",note:"Dense. Prophetic. Worth the effort."},
  ],
  finished: [
    {id:4,title:"The Innovator's Dilemma",author:"Clayton Christensen",year:"1997",format:"book",note:"Still the best framework for thinking about why incumbents fail."},
    {id:5,title:"Thinking in Systems",author:"Donella Meadows",year:"2008",format:"book",note:""},
    {id:6,title:"Scale",author:"Geoffrey West",year:"2017",format:"book",note:"The power law stuff is worth it. The second half loses the thread."},
    {id:7,title:"Poor Charlie's Almanack",author:"Charlie Munger",year:"2005",format:"book",note:"The mental models framework is real. The hagiography is tiresome."},
    {id:8,title:"The Dream Machine",author:"M. Mitchell Waldrop",year:"2001",format:"book",note:"Licklider invented the internet in his head before anyone had the hardware for it."},
  ],
  papers: [
    {id:9,title:"Attention Is All You Need",author:"Vaswani et al.",year:"2017",format:"paper",note:"Read it at least three times. It gets richer."},
    {id:10,title:"Scaling Laws for Neural Language Models",author:"Kaplan et al., OpenAI",year:"2020",format:"paper",note:""},
    {id:11,title:"The Bitter Lesson",author:"Richard Sutton",year:"2019",format:"essay",note:"Short. Important. Most ML practitioners haven't internalized it yet."},
    {id:12,title:"Kolmogorov Complexity and Algorithmic Randomness",author:"Shen, Uspensky, Vereshchagin",year:"2017",format:"paper",note:"Background reading for thinking seriously about information."},
  ],
  avoiding: [
    {id:13,title:"Zero to One",author:"Peter Thiel",year:"2014",format:"book",reason:"The insights are real but they've been quoted into meaninglessness. Read the original CS183 notes instead."},
    {id:14,title:"Atomic Habits",author:"James Clear",year:"2018",format:"book",reason:"One good idea stretched to 300 pages. The idea: systems beat goals. You now know the book."},
    {id:15,title:"The Lean Startup",author:"Eric Ries",year:"2011",format:"book",reason:"The vocabulary (MVP, pivot, build-measure-learn) ate the thinking. The book is less interesting than its shadow."},
  ],
};

/* ─── ICONS ──────────────────────────────── */
const PATHS = {
  grid:["M3 3h7v7H3zm11 0h7v7h-7zM3 14h7v7H3zm11 0h7v7h-7z"],
  file:["M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z","M14 2v6h6"],
  folder:["M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"],
  book:["M4 19.5A2.5 2.5 0 0 1 6.5 17H20","M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"],
  settings:["M12 20h9","M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"],
  user:["M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2","M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"],
  x:["M18 6L6 18","M6 6l12 12"],
  chevron:["M9 18l6-6-6-6"],
  plus:["M12 5v14","M5 12h14"],
  check:["M20 6L9 17l-5-5"],
};
const Ic = ({d,size=14,stroke="currentColor"}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={stroke} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    {(Array.isArray(d)?d:[d]).map((p,i)=><path key={i} d={p}/>)}
  </svg>
);

/* ─── TOAST ──────────────────────────────── */
function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2000);return()=>clearTimeout(t);},[]);
  return <div className="toast"><span className="toast-dot"/>{msg}</div>;
}

/* ─── SIDEBAR ─────────────────────────────── */
const NAV=[
  {id:'dashboard',label:'Dashboard',icon:'grid'},
  {type:'sep',label:'Content'},
  {id:'posts',label:'Posts',icon:'file',badge:'8'},
  {id:'projects',label:'Projects',icon:'folder',badge:'4'},
  {id:'reading',label:'Reading',icon:'book',badge:'13'},
  {type:'sep',label:'Site'},
  {id:'config',label:'Site Config',icon:'settings'},
  {id:'about',label:'About',icon:'user'},
];
function Sidebar(){
  return (
    <div className="sidebar">
      <div className="sb-brand"><span className="sb-brand-text"><span>■</span>CMS</span></div>
      {NAV.map((item,i)=>item.type==='sep'?(
        <div key={i} className="sb-sep">{item.label}</div>
      ):(
        <button key={item.id} className={`sb-link${item.id==='reading'?' active':''}`}>
          <svg className="sb-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
            {PATHS[item.icon].map((d,i)=><path key={i} d={d}/>)}
          </svg>
          {item.label}
          {item.badge&&<span className="sb-badge">{item.badge}</span>}
        </button>
      ))}
    </div>
  );
}

/* ─── SINGLE READING ROW ─────────────────── */
function ReadingRow({item, index, total, tabId, isBounced, onUpdate, onDelete, onDragStart, onDragOver, onDrop, onDragEnd, isDragging, isDragOver}){
  const [expanded, setExpanded] = useState(item._new || false);
  const [draft, setDraft] = useState({...item});
  const field = isBounced ? 'reason' : 'note';
  const fieldLabel = isBounced ? 'REASON FOR AVOIDING' : 'NOTE';
  const fieldPlaceholder = isBounced
    ? 'Why are you avoiding this? Be honest...'
    : 'What did you take away? Optional...';

  const set = (k,v) => setDraft(d=>({...d,[k]:v}));

  const handleSave = () => {
    onUpdate(draft);
    setExpanded(false);
  };
  const handleCancel = () => {
    if(item._new){onDelete(item.id);return;}
    setDraft({...item});
    setExpanded(false);
  };
  const handleKeyDown = (e) => {
    if(e.key==='Escape') handleCancel();
  };

  const noteText = item[field];

  return (
    <div
      className={`reading-row${isDragging?' dragging':''}${isDragOver?' drag-over':''}${expanded?' expanded':''}`}
      draggable={!expanded}
      onDragStart={e=>{if(!expanded)onDragStart(e,index);}}
      onDragOver={e=>{e.preventDefault();onDragOver(index);}}
      onDrop={e=>{e.preventDefault();onDrop(index);}}
      onDragEnd={onDragEnd}
    >
      {/* Collapsed row */}
      <div className="row-collapsed" onClick={()=>!expanded&&setExpanded(true)}>
        {/* Drag handle */}
        <div className="row-drag" onClick={e=>e.stopPropagation()} title="Drag to reorder">
          {[0,1,2,3,4,5].map(i=><div key={i} className="drag-dot"/>)}
        </div>

        {/* Number */}
        <div className="row-num">{String(index+1).padStart(2,'0')}</div>

        {/* Main */}
        <div className="row-main">
          <span className={`row-title${isBounced?' bounced':''}`} title={item.title}>
            {item.title||<span style={{color:'var(--t3)',fontWeight:400}}>Untitled</span>}
          </span>
          {item.author && (
            <span className="row-author">{item.author}{item.year ? ` · ${item.year}` : ''}</span>
          )}
          {item.format && (
            <span className="row-format-tag">{item.format}</span>
          )}
          {noteText && !expanded && (
            <span className="row-note-preview">{noteText}</span>
          )}
        </div>

        {/* Actions */}
        <div className="row-actions" onClick={e=>e.stopPropagation()}>
          <button className="row-del" title="Delete" onClick={()=>onDelete(item.id)}>
            <Ic d={PATHS.x} size={13}/>
          </button>
          <button
            className={`row-expanded-toggle${expanded?' open':''}`}
            onClick={e=>{e.stopPropagation();setExpanded(v=>!v);}}
            title={expanded?'Collapse':'Expand to edit'}
          >
            <Ic d={PATHS.chevron} size={13}/>
          </button>
        </div>
      </div>

      {/* Expanded edit form */}
      {expanded && (
        <div className="row-expand" onKeyDown={handleKeyDown}>
          {/* Title */}
          <div className="expand-field">
            <label className="expand-label">Title</label>
            <input
              className="expand-input"
              autoFocus
              value={draft.title}
              onChange={e=>set('title',e.target.value)}
              placeholder="Book or paper title"
            />
          </div>

          {/* Author */}
          <div className="expand-field">
            <label className="expand-label">Author</label>
            <input
              className="expand-input"
              value={draft.author}
              onChange={e=>set('author',e.target.value)}
              placeholder="Author name"
            />
          </div>

          {/* Year */}
          <div className="expand-field">
            <label className="expand-label">Year</label>
            <input
              className="expand-input"
              value={draft.year}
              onChange={e=>set('year',e.target.value)}
              placeholder="2024"
              style={{width:'100%'}}
            />
          </div>

          {/* Format */}
          <div className="expand-field">
            <label className="expand-label">Format</label>
            <div style={{position:'relative'}}>
              <select
                className="expand-select"
                value={draft.format}
                onChange={e=>set('format',e.target.value)}
              >
                <option value="book">BOOK</option>
                <option value="paper">PAPER</option>
                <option value="essay">ESSAY</option>
              </select>
              <div style={{position:'absolute',right:7,top:'50%',transform:'translateY(-50%)',pointerEvents:'none',color:'var(--t3)'}}>
                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 9l6 6 6-6"/></svg>
              </div>
            </div>
          </div>

          {/* Note/Reason — spans full width */}
          <div className="expand-field" style={{gridColumn:'1/-1'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:'10px',alignItems:'end'}}>
              <div>
                <label className="expand-label">{fieldLabel}</label>
                <textarea
                  className="expand-textarea"
                  value={draft[field]||''}
                  onChange={e=>set(field,e.target.value)}
                  placeholder={fieldPlaceholder}
                  rows={2}
                />
              </div>
              <div className="expand-actions" style={{paddingBottom:2}}>
                <button className="btn btn-ghost btn-xs" onClick={handleCancel}>CANCEL</button>
                <button className="btn btn-primary btn-xs" onClick={handleSave} style={{display:'flex',alignItems:'center',gap:4}}>
                  <Ic d={PATHS.check} size={9} stroke="#fff"/>SAVE
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── READING LIST (per tab) ─────────────── */
function ReadingList({tabId, isBounced, showToast}){
  const [items, setItems] = useState(()=>INIT[tabId].map(i=>({...i})));
  const [dragIdx, setDragIdx] = useState(null);
  const [overIdx, setOverIdx] = useState(null);

  const update = (id, newItem) => {
    setItems(prev=>prev.map(i=>i.id===id ? {...newItem,_new:false} : i));
    showToast('ENTRY SAVED');
  };
  const remove = (id) => {
    setItems(prev=>prev.filter(i=>i.id!==id));
    showToast('ENTRY DELETED');
  };
  const addItem = () => {
    const newItem = {
      id:uid(), title:'', author:'', year:'', format: isBounced ? 'book' : tabId==='papers' ? 'paper' : 'book',
      note:'', reason:'', _new:true,
    };
    setItems(prev=>[...prev, newItem]);
  };

  const handleDragStart = (e, i) => { setDragIdx(i); e.dataTransfer.effectAllowed='move'; };
  const handleDragOver = (i) => { if(i!==overIdx) setOverIdx(i); };
  const handleDrop = (i) => {
    if(dragIdx===null || dragIdx===i){setDragIdx(null);setOverIdx(null);return;}
    const arr=[...items];
    const [moved]=arr.splice(dragIdx,1);
    arr.splice(i,0,moved);
    setItems(arr);
    setDragIdx(null);setOverIdx(null);
    showToast('ORDER UPDATED');
  };
  const handleDragEnd = () => {setDragIdx(null);setOverIdx(null);};

  const noteLabel = isBounced ? 'REASON' : 'NOTE';

  return (
    <div className="reading-list-wrap">
      {/* Column headers */}
      <div className="list-toolbar">
        <div className="list-toolbar-left">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12h14"/></svg>
          DRAG TO REORDER
          <span style={{color:'var(--border)',margin:'0 4px'}}>·</span>
          CLICK ROW TO EDIT
        </div>
        <span className="list-toolbar-hint">{items.length} {items.length===1?'ENTRY':'ENTRIES'}</span>
      </div>

      {/* Column label row */}
      <div style={{
        display:'grid', gridTemplateColumns:'16px 28px 1fr auto',
        gap:'0 12px', padding:'6px 16px 5px 12px',
        background:'var(--bg)', borderBottom:'1px solid var(--border)',
      }}>
        <div/>
        <div/>
        <div style={{display:'flex',gap:12,alignItems:'center'}}>
          {['TITLE','AUTHOR · YEAR','FORMAT',noteLabel+' PREVIEW'].map(l=>(
            <span key={l} style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--t3)'}}>
              {l}
            </span>
          ))}
        </div>
        <div/>
      </div>

      {/* Items */}
      {items.length===0 ? (
        <div className="empty-state">No entries yet. Add one below.</div>
      ) : (
        items.map((item,i)=>(
          <ReadingRow
            key={item.id}
            item={item}
            index={i}
            total={items.length}
            tabId={tabId}
            isBounced={isBounced}
            onUpdate={(updated)=>update(item.id,updated)}
            onDelete={remove}
            onDragStart={handleDragStart}
            onDragOver={handleDragOver}
            onDrop={handleDrop}
            onDragEnd={handleDragEnd}
            isDragging={dragIdx===i}
            isDragOver={overIdx===i}
          />
        ))
      )}

      {/* Add row */}
      <div className="add-row">
        <button className="add-btn" onClick={addItem}>
          <Ic d={PATHS.plus} size={11}/> ADD ENTRY
        </button>
      </div>
    </div>
  );
}

/* ─── READING SECTION ────────────────────── */
const TABS = [
  {id:'current',  label:'Currently Reading', icon:'📖', isBounced:false},
  {id:'finished', label:'Finished Recently',  icon:null, isBounced:false},
  {id:'papers',   label:'Papers',             icon:null, isBounced:false},
  {id:'avoiding', label:'Bounced Off',        icon:null, isBounced:true},
];

function ReadingSection({showToast}){
  const [activeTab, setActiveTab] = useState('current');
  const counts = {
    current: INIT.current.length,
    finished: INIT.finished.length,
    papers: INIT.papers.length,
    avoiding: INIT.avoiding.length,
  };

  const tab = TABS.find(t=>t.id===activeTab);

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="ph-title">Reading</div>
          <div className="breadcrumb">
            <button className="bc-link">Admin</button><span>/</span><span>Reading</span>
          </div>
        </div>
        <button className="btn btn-primary btn-sm" style={{padding:'7px 14px',fontSize:10}}>
          SAVE ALL CHANGES
        </button>
      </div>

      {/* Tabs */}
      <div className="tabs-bar">
        {TABS.map(t=>(
          <button
            key={t.id}
            className={`tab-btn${activeTab===t.id?' active':''}`}
            onClick={()=>setActiveTab(t.id)}
          >
            {t.label}
            <span className="tab-count">{counts[t.id]}</span>
          </button>
        ))}
      </div>

      {/* Active list */}
      <ReadingList
        key={activeTab}
        tabId={activeTab}
        isBounced={tab.isBounced}
        showToast={showToast}
      />
    </div>
  );
}

/* ─── APP ────────────────────────────────── */
function App(){
  const [toast, setToast] = useState(null);
  const showToast = useCallback(msg=>{setToast(null);setTimeout(()=>setToast(msg),10);},[]);

  return (
    <div className="shell">
      <Sidebar/>
      <div className="main">
        <div className="topbar">
          <div className="tb-title">
            <span>ADMIN</span><span className="tb-sep">/</span>
            <strong>UTKARSH PANCHAL</strong><span className="tb-sep">·</span>
            <span style={{color:'var(--t3)'}}>READING</span>
          </div>
          <div className="tb-right">
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--t3)'}}>LOGGED IN AS UP</span>
            <button className="tb-link">VIEW SITE ↗</button>
          </div>
        </div>
        <div className="content">
          <ReadingSection showToast={showToast}/>
        </div>
      </div>
      {toast&&<Toast key={toast+Date.now()} msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
