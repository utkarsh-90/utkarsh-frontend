<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Utkarsh Panchal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
<style>
/* ─── RESET ─────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
img,svg{display:block}
button{font:inherit;cursor:pointer}

/* ─── TOKENS ─────────────────────────────── */
:root {
  --bg:       #f5f5f7;
  --surface:  #ffffff;
  --t1:       #0a0a0f;
  --t2:       #5a5a66;
  --t3:       #9a9aa6;
  --border:   #e1e1e6;
  --accent:   #1d4ed8;
  --accent-h: #3b82f6;
  --nav-h:    48px;
  --meta-h:   36px;
  --gutter:   32px;
  --margin:   64px;
}

/* ─── BASE ────────────────────────────────── */
html { font-size:17px; }
body {
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg); color:var(--t1);
  line-height:1.6; font-weight:400;
  -webkit-font-smoothing:antialiased;
  transition:background 0ms,color 0ms; /* swiss: instant */
}

/* ─── TYPE SCALE ─────────────────────────── */
.h1 { font-size:48px; line-height:1.1; letter-spacing:-0.02em; font-weight:600; }
.h2 { font-size:32px; line-height:1.15; letter-spacing:-0.015em; font-weight:600; }
.h3 { font-size:20px; line-height:1.3; font-weight:500; }
.body-text { font-size:17px; line-height:1.6; font-weight:400; }
.small-text { font-size:14px; line-height:1.4; font-weight:400; }
/* Signature: mono micro labels */
.mono {
  font-family:'JetBrains Mono',monospace;
  font-size:12px; line-height:1.3; font-weight:500;
  letter-spacing:0.08em; text-transform:uppercase;
}
.mono-sm {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; line-height:1.3; font-weight:400;
  letter-spacing:0.06em; text-transform:uppercase;
}

/* ─── LAYOUT ─────────────────────────────── */
.outer {
  max-width:1440px; margin:0 auto;
  padding-left:var(--margin); padding-right:var(--margin);
}
.outer-narrow {
  max-width:calc(720px + var(--margin)*2); margin:0 auto;
  padding-left:var(--margin); padding-right:var(--margin);
}
@media(max-width:900px){
  :root{ --margin:24px; --gutter:16px; }
  html{ font-size:16px; }
}
@media(max-width:640px){
  :root{ --margin:16px; }
  .h1{ font-size:32px; }
  .h2{ font-size:24px; }
}

/* ─── NAV ─────────────────────────────────── */
.nav-wrap {
  position:sticky; top:0; z-index:200;
  background:var(--bg);
}
.nav-bar {
  border-bottom:1px solid var(--accent);
  height:var(--nav-h);
  display:flex; align-items:center;
}
.nav-inner {
  width:100%; display:flex; align-items:center;
  justify-content:space-between;
}
.nav-logo {
  font-family:'JetBrains Mono',monospace;
  font-size:13px; font-weight:500;
  letter-spacing:0.08em; text-transform:uppercase;
  color:var(--t1); background:none; border:none; padding:0;
  cursor:pointer;
}
.nav-right {
  display:flex; align-items:center; gap:0;
  font-family:'JetBrains Mono',monospace;
  font-size:12px; font-weight:500;
  letter-spacing:0.08em; text-transform:uppercase;
}
.nav-link {
  color:var(--t2); background:none; border:none; padding:0 0;
  cursor:pointer; transition:color 100ms;
}
.nav-link:hover,.nav-link.active{color:var(--accent);}
.nav-sep {color:var(--t3); margin:0 8px; user-select:none;}
.theme-btn {
  color:var(--t3); background:none; border:none; padding:0;
  cursor:pointer; transition:color 100ms;
  font-family:'JetBrains Mono',monospace;
  font-size:12px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase;
}
.theme-btn:hover{color:var(--t1);}
.theme-active{color:var(--t1)!important;}

/* Meta row */
.meta-row {
  height:var(--meta-h);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center;
}
.meta-inner {
  width:100%; display:flex; align-items:center;
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:400;
  letter-spacing:0.06em;
  color:var(--t3);
  gap:0;
  white-space:nowrap; overflow:hidden;
}
.meta-date { flex-shrink:0; }
.meta-dots { flex:1; overflow:hidden; margin:0 8px; color:var(--border); letter-spacing:0.04em; }
.meta-status { flex-shrink:0; letter-spacing:0.06em; color:var(--t2); }

/* ─── PAGE ENTER ─────────────────────────── */
/* Swiss: no animation */
.page-wrap { padding-top:56px; }

/* ─── SECTION HEADER ─────────────────────── */
.section-hd {
  display:flex; align-items:center; gap:0;
  margin-bottom:24px;
}
.section-hd-label {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:500;
  letter-spacing:0.1em; text-transform:uppercase;
  color:var(--t3); white-space:nowrap; flex-shrink:0;
}
.section-hd-rule {
  flex:1; height:1px; background:var(--border); margin-left:16px;
}

/* ─── DIVIDERS ───────────────────────────── */
.rule { border:none; border-top:1px solid var(--border); }
.rule-accent { border:none; border-top:1px solid var(--accent); }

/* ─── HOME ───────────────────────────────── */
.home-grid {
  display:grid;
  grid-template-columns:7fr 1px 5fr;
  gap:0;
  min-height:600px;
}
.home-col { padding:32px 0; }
.home-col-left { padding-right:48px; }
.home-col-right { padding-left:48px; }
.home-col-rule { background:var(--border); }

/* Category strip */
.cat-strip {
  display:flex; flex-wrap:wrap; align-items:center;
  gap:0; margin-bottom:24px;
}
.cat-link {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:500;
  letter-spacing:0.1em; text-transform:uppercase;
  color:var(--t3); background:none; border:none; padding:0;
  cursor:pointer; transition:color 100ms;
}
.cat-link:hover{color:var(--accent);}
.cat-slash { color:var(--border); margin:0 6px; font-family:'JetBrains Mono',monospace; font-size:11px; }

/* Post row (home) */
.home-post-row {
  padding:16px 0;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  display:grid;
  grid-template-columns:40px 1fr;
  gap:0 12px;
  align-items:start;
}
.home-post-row:first-child { border-top:1px solid var(--border); }
.home-post-num {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:400;
  color:var(--t3); padding-top:3px;
  letter-spacing:0.04em;
}
.home-post-title {
  font-size:16px; font-weight:500;
  color:var(--t1); line-height:1.3;
  margin-bottom:6px;
  transition:color 100ms;
}
.home-post-row:hover .home-post-title { color:var(--accent); }
.home-post-meta {
  font-family:'JetBrains Mono',monospace;
  font-size:10px; font-weight:400;
  letter-spacing:0.06em; text-transform:uppercase;
  color:var(--t3);
}

/* All link */
.all-link {
  display:inline-flex; align-items:center; gap:6px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:500;
  letter-spacing:0.08em; text-transform:uppercase;
  color:var(--t2); background:none; border:none; padding:0;
  cursor:pointer; transition:color 100ms; margin-top:16px;
}
.all-link:hover{color:var(--accent);}
.all-link-count{color:var(--t3);}

/* Project row (home) */
.home-proj-row {
  padding:16px 0;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  display:grid;
  grid-template-columns:40px 1fr;
  gap:0 12px;
}
.home-proj-row:first-child{border-top:1px solid var(--border);}
.home-proj-row:hover .home-proj-name{color:var(--accent);}
.home-proj-num {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:400; color:var(--t3);
  padding-top:3px; letter-spacing:0.04em;
}
.home-proj-name {
  font-size:16px; font-weight:500;
  color:var(--t1); margin-bottom:4px;
  line-height:1.3; transition:color 100ms;
}
.home-proj-desc {
  font-size:13px; color:var(--t2);
  line-height:1.5; margin-bottom:6px;
  display:-webkit-box; -webkit-line-clamp:2; line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.home-proj-meta {
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:0.06em; text-transform:uppercase;
  color:var(--t3);
}
.proj-status-shipped{color:var(--accent);}
.proj-status-wip{color:var(--t2);}
.proj-status-archived{color:var(--t3);}

/* ─── NEWSLETTER ─────────────────────────── */
.nl-wrap {
  border-top:1px solid var(--accent);
  padding:40px 0;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0 64px;
  align-items:center;
}
@media(max-width:700px){
  .nl-wrap{ grid-template-columns:1fr; gap:24px; }
}
.nl-desc { font-size:15px; color:var(--t2); line-height:1.6; }
.nl-form { display:flex; align-items:flex-end; gap:0; }
.nl-input {
  flex:1;
  border:none; border-bottom:1px solid var(--t2);
  background:transparent; color:var(--t1);
  font-family:'Inter',sans-serif; font-size:15px;
  padding:8px 0; outline:none;
  transition:border-color 100ms;
}
.nl-input::placeholder{color:var(--t3);}
.nl-input:focus{border-color:var(--accent);}
.nl-btn {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:500;
  letter-spacing:0.1em; text-transform:uppercase;
  background:var(--accent); color:#fff;
  border:none; padding:9px 16px;
  cursor:pointer; transition:background 100ms; white-space:nowrap;
  margin-left:16px;
}
.nl-btn:hover{background:var(--accent-h);}

/* ─── FOOTER ─────────────────────────────── */
.site-footer {
  border-top:1px solid var(--border);
  margin-top:80px; padding:32px 0 40px;
}
.footer-row {
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:8px 24px; margin-bottom:16px;
}
.footer-row:last-child{margin-bottom:0;}
.footer-name {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--t2);
}
.footer-socials {
  display:flex; gap:0; align-items:center;
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:400; letter-spacing:0.06em; text-transform:uppercase;
}
.footer-social-link {
  color:var(--t3); background:none; border:none; padding:0;
  cursor:pointer; transition:color 100ms;
}
.footer-social-link:hover{color:var(--accent);}
.footer-social-sep{color:var(--border); margin:0 8px;}
.footer-tertiary {
  display:flex; gap:0; align-items:center;
  font-family:'JetBrains Mono',monospace;
  font-size:11px; letter-spacing:0.06em; text-transform:uppercase;
}
.footer-tlink {
  color:var(--t3); background:none; border:none; padding:0;
  cursor:pointer; transition:color 100ms;
}
.footer-tlink:hover{color:var(--t1);}
.footer-built {
  font-family:'JetBrains Mono',monospace;
  font-size:10px; font-weight:400; letter-spacing:0.06em; text-transform:uppercase;
  color:var(--t3);
}

/* ─── WRITING LIST ───────────────────────── */
.writing-post-row {
  padding:20px 0;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  display:grid;
  grid-template-columns:48px 1fr;
  gap:0 12px;
}
.writing-post-row:first-child{border-top:1px solid var(--border);}
.writing-post-row:hover .writing-post-title{color:var(--accent);}
.writing-post-num {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; color:var(--t3); padding-top:3px; letter-spacing:0.04em;
}
.writing-post-title {
  font-size:20px; font-weight:500; color:var(--t1);
  line-height:1.3; margin-bottom:6px; transition:color 100ms;
}
.writing-post-meta {
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:0.06em; text-transform:uppercase;
  color:var(--t3); margin-bottom:6px;
}
.writing-post-excerpt {
  font-size:14px; color:var(--t2); line-height:1.5;
  display:-webkit-box; -webkit-line-clamp:2; line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}

/* Filter row */
.filter-row {
  display:flex; align-items:center; gap:0;
  border-bottom:1px solid var(--border);
  margin-bottom:0; overflow-x:auto; scrollbar-width:none;
}
.filter-row::-webkit-scrollbar{display:none;}
.filter-tab {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--t3); background:none; border:none;
  padding:10px 16px; cursor:pointer; white-space:nowrap;
  border-bottom:2px solid transparent; margin-bottom:-1px;
  transition:color 100ms;
}
.filter-tab:hover{color:var(--t1);}
.filter-tab.active{color:var(--accent); border-bottom-color:var(--accent);}
.filter-count {
  margin-left:auto;
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:0.06em; text-transform:uppercase;
  color:var(--t3); padding:10px 0; white-space:nowrap; flex-shrink:0;
}

/* ─── POST PAGE ──────────────────────────── */
.post-back {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--t3); background:none; border:none; padding:0;
  cursor:pointer; display:flex; align-items:center; gap:6px;
  transition:color 100ms; margin-bottom:32px;
}
.post-back:hover{color:var(--accent);}
.post-meta-row {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--t3); margin-bottom:20px;
  display:flex; gap:8px; align-items:center; flex-wrap:wrap;
}
.post-meta-sep{color:var(--border);}
.post-accent-rule{height:1px; background:var(--accent); margin:24px 0 40px;}

/* Prose */
.prose {
  font-size:17px; line-height:1.7; color:var(--t1);
}
.prose p{margin-bottom:1.6em;}
.prose h2{
  font-size:20px; font-weight:600; margin:2.5em 0 0.6em;
  letter-spacing:-0.01em;
}
.prose h2 .overline {
  display:block;
  font-family:'JetBrains Mono',monospace;
  font-size:10px; font-weight:500;
  letter-spacing:0.1em; text-transform:uppercase;
  color:var(--t3); margin-bottom:6px;
}
.prose blockquote {
  margin:2em 0; padding-left:20px;
  border-left:2px solid var(--accent);
  font-style:italic; color:var(--t2);
}
.prose pre {
  background:var(--surface); border:1px solid var(--border);
  padding:20px; overflow-x:auto; margin:1.5em 0;
  position:relative;
}
.prose code {
  font-family:'JetBrains Mono',monospace;
  font-size:13px; line-height:1.6;
}
.prose p code, .prose li code {
  background:var(--surface); padding:2px 5px;
  font-size:14px;
}
.copy-btn {
  position:absolute; top:10px; right:10px;
  font-family:'JetBrains Mono',monospace;
  font-size:10px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase;
  background:var(--bg); border:1px solid var(--border);
  color:var(--t3); padding:3px 8px; cursor:pointer;
  opacity:0; transition:opacity 100ms, color 100ms;
}
.prose pre:hover .copy-btn{opacity:1;}
.copy-btn:hover{color:var(--accent);}
.post-end-rule{height:1px; background:var(--accent); margin:48px 0 32px;}
.related-mini {
  display:grid; grid-template-columns:32px 1fr; gap:0 12px;
  padding:14px 0; border-bottom:1px solid var(--border);
  cursor:pointer;
}
.related-mini:hover .related-mini-title{color:var(--accent);}
.related-mini-num{font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--t3); padding-top:2px;}
.related-mini-title{font-size:15px; font-weight:500; color:var(--t1); transition:color 100ms; margin-bottom:3px;}
.related-mini-date{font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--t3); text-transform:uppercase; letter-spacing:0.06em;}

/* ─── PROJECTS PAGE ─────────────────────── */
.proj-list-row {
  display:grid;
  grid-template-columns:3fr 6fr 3fr;
  gap:0 32px;
  padding:32px 0;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:background 100ms;
  position:relative;
}
.proj-list-row:first-child{border-top:1px solid var(--border);}
.proj-list-row:hover{background:var(--surface);}
.proj-list-row:hover::after{
  content:''; position:absolute; bottom:-1px; left:0; right:0;
  height:1px; background:var(--accent);
}
.proj-list-num{
  font-family:'JetBrains Mono',monospace;
  font-size:32px; font-weight:400; color:var(--t3);
  letter-spacing:-0.02em; line-height:1;
  margin-bottom:6px;
}
.proj-list-status{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase;
}
.proj-list-name{
  font-size:24px; font-weight:600; color:var(--t1);
  letter-spacing:-0.015em; margin-bottom:10px;
  transition:color 100ms;
}
.proj-list-row:hover .proj-list-name{color:var(--accent);}
.proj-list-desc{font-size:14px; color:var(--t2); line-height:1.6; margin-bottom:12px;}
.proj-list-stack{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:0.06em; text-transform:uppercase;
  color:var(--t3);
}
.proj-list-meta{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:0.06em; text-transform:uppercase;
  color:var(--t3); line-height:2;
}
.proj-list-meta a{color:var(--accent); text-decoration:none; background:none; border:none; cursor:pointer;}
.proj-list-meta a:hover{text-decoration:underline;}

/* ─── PROJECT DETAIL ─────────────────────── */
.proj-section-label {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--t3); margin-bottom:12px;
}
.proj-section-body {
  font-size:17px; line-height:1.7; color:var(--t1);
  margin-bottom:40px;
}
.proj-prev-next {
  display:flex; justify-content:space-between;
  border-top:1px solid var(--border);
  padding-top:24px; margin-top:16px; gap:24px; flex-wrap:wrap;
}
.proj-nav-btn {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--t2); background:none; border:none; padding:0;
  cursor:pointer; transition:color 100ms;
}
.proj-nav-btn:hover{color:var(--accent);}

/* ─── READING PAGE ───────────────────────── */
.reading-row {
  display:grid;
  grid-template-columns:48px 1fr 280px;
  gap:0 24px;
  padding:16px 0;
  border-bottom:1px solid var(--border);
  align-items:start;
}
.reading-row:first-child{border-top:1px solid var(--border);}
.reading-num{
  font-family:'JetBrains Mono',monospace;
  font-size:11px; color:var(--t3); letter-spacing:0.04em; padding-top:3px;
}
.reading-title{font-size:17px; font-weight:500; color:var(--t1); margin-bottom:4px; line-height:1.3;}
.reading-meta{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--t3);
}
.reading-note-col{
  font-size:13px; font-style:italic; color:var(--t2);
  line-height:1.5; text-align:right; padding-top:3px;
}
/* Inline note (shown on smaller screens where the right column collapses) */
.reading-note-inline{
  display:none;
  font-size:14px; font-style:italic; color:var(--t2);
  line-height:1.5; margin-top:8px;
  padding-left:12px; border-left:2px solid var(--border);
}
.bounced-row{
  display:grid;
  grid-template-columns:48px 1fr 280px;
  gap:0 24px;
  padding:16px 0;
  border-bottom:1px solid var(--border);
  align-items:start;
}

</head>
<body>
<div id="root"></div>
<script src="tweaks-panel.jsx" type="text/babel"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ─── TWEAKS ─────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showColumnRules": true,
  "showExcerpts": true
}/*EDITMODE-END*/;

/* ─── UTILS ──────────────────────────────── */
function getDerivedCategories() {
  return ['all', ...[...new Set(SITE_DATA.posts.map(p => p.category))].sort()];
}
function zeroPad(n, len=3) { return String(n).padStart(len,'0'); }
function statusClass(s) { return s === 'shipped' ? 'proj-status-shipped' : s === 'wip' ? 'proj-status-wip' : 'proj-status-archived'; }
function statusLabel(s) { return s === 'shipped' ? 'SHIPPED' : s === 'wip' ? 'IN PROGRESS' : 'ARCHIVED'; }

/* ─── META DOT FILL ─────────────────────── */
function getMetaStatus(page) {
  const cfg = window.SITE_CONFIG?.currently || {};
  const aboutLine = window.SITE_CONFIG?.about || '';
  if (page === 'home') {
    return `INDEX · ${SITE_DATA.posts.length} ESSAYS / ${SITE_DATA.projects.length} PROJECTS`;
  }
  if (page === 'writing' || page.startsWith('writing?')) {
    return cfg.writing ? `DRAFTING · ${cfg.writing.toUpperCase()}` : '';
  }
  if (page.startsWith('writing/')) {
    return cfg.writing ? `DRAFTING · ${cfg.writing.toUpperCase()}` : '';
  }
  if (page === 'projects' || page.startsWith('projects/')) {
    return cfg.building ? `BUILDING · ${cfg.building.toUpperCase()}` : '';
  }
  if (page === 'reading') {
    return cfg.reading ? `NOW · READING ${cfg.reading.toUpperCase()}` : '';
  }
  if (page === 'about') {
    return aboutLine.toUpperCase();
  }
  return '';
}

function MetaRow({ page }) {
  const ref = useRef(null);
  const dotsRef = useRef(null);
  const [dots, setDots] = useState('·········');
  const today = new Date();
  const dateStr = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
  const statusStr = getMetaStatus(page);

  useEffect(() => {
    function fill() {
      if (!ref.current || !dotsRef.current) return;
      const avail = dotsRef.current.offsetWidth;
      const charW = 8.4; // approx mono char width at 11px
      const count = Math.max(3, Math.floor(avail / charW));
      setDots('·'.repeat(count));
    }
    fill();
    const ro = new ResizeObserver(fill);
    if (ref.current) ro.observe(ref.current);
    return () => ro.disconnect();
  }, [statusStr]);

  return (
    <div className="meta-row">
      <div className="meta-inner outer" ref={ref}>
        <span className="meta-date">{dateStr}</span>
        <span className="meta-dots" ref={dotsRef}>{dots}</span>
        <span className="meta-status">{statusStr}</span>
      </div>
    </div>
  );
}

/* ─── NAV ────────────────────────────────── */
function Nav({ page, navigate, tweaks }) {
  return (
    <div className="nav-wrap">
      <div className="nav-bar">
        <div className="outer nav-inner">
          <button className="nav-logo" onClick={() => navigate('home')}>UTKARSH PANCHAL</button>
          <div className="nav-right">
            <button className={`nav-link${page==='writing'||page.startsWith('writing')?' active':''}`} onClick={() => navigate('writing')}>WRITING</button>
            <span className="nav-sep">/</span>
            <button className={`nav-link${page==='projects'||page.startsWith('projects')?' active':''}`} onClick={() => navigate('projects')}>PROJECTS</button>
            <span className="nav-sep">/</span>
            <button className={`nav-link${page==='reading'?' active':''}`} onClick={() => navigate('reading')}>READING</button>
            <span className="nav-sep">/</span>
            <button className={`nav-link${page==='about'?' active':''}`} onClick={() => navigate('about')}>ABOUT</button>
          </div>
        </div>
      </div>
      <MetaRow page={page} />
    </div>
  );
}

/* ─── NEWSLETTER ─────────────────────────── */
function Newsletter() {
  const [val, setVal] = useState('');
  const [done, setDone] = useState(false);
  return done ? (
    <p className="mono text-muted" style={{padding:'24px 0'}}>YOU'RE IN. SEE YOU IN YOUR INBOX.</p>
  ) : (
    <div className="nl-wrap">
      <p className="nl-desc">Essays on tech, AI, and the things in between. Monthly-ish, no filler.</p>
      <form className="nl-form" onSubmit={e=>{e.preventDefault();if(val.trim())setDone(true);}}>
        <input className="nl-input" type="email" placeholder="your@email.com" value={val} onChange={e=>setVal(e.target.value)} />
        <button className="nl-btn" type="submit">SUBSCRIBE</button>
      </form>
    </div>
  );
}

/* ─── FOOTER ─────────────────────────────── */
function Footer({ navigate }) {
  return (
    <footer className="site-footer">
      <div className="outer">
        <div className="footer-row">
          <span className="footer-name">UTKARSH PANCHAL © 2026</span>
          <div className="footer-socials">
            {['X','GITHUB','LINKEDIN'].map((s,i,arr) => (
              <React.Fragment key={s}>
                <button className="footer-social-link" onClick={e=>e.preventDefault()}>{s}</button>
                {i < arr.length-1 && <span className="footer-social-sep">/</span>}
              </React.Fragment>
            ))}
          </div>
        </div>
      </div>
    </footer>
  );
}

/* ─── SECTION HEADER ─────────────────────── */
function SectionHd({ label }) {
  return (
    <div className="section-hd">
      <span className="section-hd-label">{label}</span>
      <div className="section-hd-rule"></div>
    </div>
  );
}

/* ─── CATEGORY STRIP ─────────────────────── */
function CatStrip({ navigate }) {
  const cats = getDerivedCategories().filter(c => c !== 'all');
  return (
    <div className="cat-strip mb-24">
      {cats.map((cat, i) => (
        <React.Fragment key={cat}>
          <button className="cat-link" onClick={() => navigate('writing?filter='+cat)}>
            {cat.toUpperCase()}
          </button>
          {i < cats.length - 1 && <span className="cat-slash">/</span>}
        </React.Fragment>
      ))}
    </div>
  );
}

/* ─── HOME ───────────────────────────────── */
function HomePage({ navigate, tweaks }) {
  const posts = SITE_DATA.posts.slice(0, 5);
  const projects = SITE_DATA.projects.filter(p => p.status !== 'archived');

  return (
    <div className="page-wrap">
      <div className="outer">
        <div className="home-grid">
          {/* LEFT: Writing */}
          <div className="home-col home-col-left">
            <SectionHd label="01 / WRITING" />
            <CatStrip navigate={navigate} />
            {posts.map((post, i) => (
              <div key={post.slug} className="home-post-row" onClick={() => navigate('writing/'+post.slug)}>
                <span className="home-post-num">{zeroPad(i+1)}</span>
                <div>
                  <div className="home-post-title">{post.title}</div>
                  <div className="home-post-meta">{post.date} · {post.readTime} · {post.category.toUpperCase()}</div>
                </div>
              </div>
            ))}
            <button className="all-link" onClick={() => navigate('writing')}>
              → ALL WRITING <span className="all-link-count">({SITE_DATA.posts.length})</span>
            </button>
          </div>

          {/* COLUMN RULE */}
          <div className="home-col-rule"></div>

          {/* RIGHT: Projects */}
          <div className="home-col home-col-right">
            <SectionHd label="02 / PROJECTS" />
            {projects.map((p, i) => (
              <div key={p.slug} className="home-proj-row" onClick={() => navigate('projects/'+p.slug)}>
                <span className="home-proj-num">{zeroPad(i+1)}</span>
                <div>
                  <div className="home-proj-name">{p.name}</div>
                  <div className="home-proj-desc">{p.description}</div>
                  <div className="home-proj-meta">
                    <span className={statusClass(p.status)}>{statusLabel(p.status)}</span>
                    <span style={{color:'var(--border)', margin:'0 6px'}}>·</span>
                    {p.stack.slice(0,3).join(' / ')}
                  </div>
                </div>
              </div>
            ))}
            <button className="all-link" onClick={() => navigate('projects')}>
              → ALL PROJECTS <span className="all-link-count">({SITE_DATA.projects.length})</span>
            </button>
          </div>
        </div>

        <div className="mt-16 mb-16">
          <Newsletter />
        </div>
      </div>
      <Footer navigate={navigate} />
    </div>
  );
}

/* ─── WRITING LIST ───────────────────────── */
function WritingPage({ navigate, tweaks, initialFilter }) {
  const [filter, setFilter] = useState(initialFilter || 'all');
  const [animKey, setAnimKey] = useState(0);
  const cats = getDerivedCategories();
  const filtered = filter === 'all' ? SITE_DATA.posts : SITE_DATA.posts.filter(p => p.category === filter);

  const changeFilter = f => { setFilter(f); setAnimKey(k=>k+1); };

  return (
    <div className="page-wrap">
      <div className="outer">
        <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:32,flexWrap:'wrap',gap:8}}>
          <div>
            <h1 className="h1 mb-8">WRITING</h1>
            <span className="mono-sm text-muted">01 / ESSAYS, NOTES, AND ARGUMENTS</span>
          </div>
        </div>

        <div className="filter-row">
          {cats.map(cat => (
            <button key={cat} className={`filter-tab${filter===cat?' active':''}`}
              onClick={() => changeFilter(cat)}>
              {cat.toUpperCase()}
            </button>
          ))}
          <span className="filter-count">
            {SITE_DATA.posts.length} POSTS{filter!=='all' ? ` / FILTERED: ${filtered.length}` : ''}
          </span>
        </div>

        <div key={animKey} style={{opacity:1,transition:'opacity 150ms'}}>
          {filtered.map((post, i) => (
            <div key={post.slug} className="writing-post-row" onClick={() => navigate('writing/'+post.slug)}>
              <span className="writing-post-num">{zeroPad(i+1)}</span>
              <div>
                <div className="writing-post-title">{post.title}</div>
                <div className="writing-post-meta">{post.date} · {post.readTime} · {post.category.toUpperCase()}</div>
                {tweaks.showExcerpts && <div className="writing-post-excerpt">{post.excerpt}</div>}
              </div>
            </div>
          ))}
        </div>
      </div>
      <Footer navigate={navigate} />
    </div>
  );
}

/* ─── POST PAGE ──────────────────────────── */
function PostPage({ slug, navigate }) {
  const post = SITE_DATA.posts.find(p => p.slug === slug);
  const postIdx = SITE_DATA.posts.findIndex(p => p.slug === slug);
  const related = SITE_DATA.posts.filter(p => p.category === post?.category && p.slug !== slug).slice(0,3);
  const [copied, setCopied] = useState(false);

  if (!post) return <div className="page-wrap outer">Post not found.</div>;

  const essayNum = zeroPad(postIdx + 1);

  return (
    <div className="page-wrap">
      <div className="outer-narrow" style={{paddingTop:0}}>
        <button className="post-back" onClick={() => navigate('writing')}>← WRITING</button>

        <div className="post-meta-row">
          <span>{post.date.toUpperCase()}</span>
          <span className="post-meta-sep">·</span>
          <span>{post.readTime.toUpperCase()}</span>
          <span className="post-meta-sep">·</span>
          <span>{post.category.toUpperCase()}</span>
          <span className="post-meta-sep">·</span>
          <span>ESSAY {essayNum}</span>
        </div>

        <h1 className="h1" style={{marginBottom:0}}>{post.title}</h1>
        <div className="post-accent-rule"></div>

        <div className="prose" dangerouslySetInnerHTML={{__html: post.body}} />

        <div className="post-end-rule"></div>

        <div style={{marginBottom:32}}>
          <button className="post-back" onClick={() => document.documentElement.scrollTop = 0}>↑ BACK TO TOP</button>
        </div>

        <Newsletter />

        {related.length > 0 && (
          <div className="mt-48">
            <SectionHd label="RELATED" />
            {related.map((r, i) => (
              <div key={r.slug} className="related-mini" onClick={() => navigate('writing/'+r.slug)}>
                <span className="related-mini-num">{zeroPad(i+1)}</span>
                <div>
                  <div className="related-mini-title">{r.title}</div>
                  <div className="related-mini-date">{r.date}</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
      <Footer navigate={navigate} />
    </div>
  );
}

/* ─── PROJECTS PAGE ──────────────────────── */
function ProjectsPage({ navigate }) {
  return (
    <div className="page-wrap">
      <div className="outer">
        <div style={{marginBottom:40}}>
          <h1 className="h1 mb-8">PROJECTS</h1>
          <span className="mono-sm text-muted">02 / THINGS BUILT, SHIPPED, OR ABANDONED</span>
        </div>

          </div>

      </div>
      <Footer navigate={navigate} />

/* ─── PROJECT DETAIL ─────────────────────── */
function ProjectDetailPage({ slug, navigate }) {
  const project = SITE_DATA.projects.find(p => p.slug === slug);
  const idx = SITE_DATA.projects.findIndex(p => p.slug === slug);
  const prev = SITE_DATA.projects[idx - 1];
  const next = SITE_DATA.projects[idx + 1];

  return (
    <div className="page-wrap">
      <div className="outer-narrow">
        <button className="post-back" onClick={() => navigate('projects')}>← PROJECTS</button>

        <div className="post-meta-row">
          <span className={statusClass(project.status)}>{statusLabel(project.status)}</span>
          <span className="post-meta-sep">·</span>
          <span>{project.stack.join(' / ')}</span>
        </div>

        <h1 className="h1" style={{marginBottom:0}}>{project.name}</h1>
        <div className="post-accent-rule"></div>

        {[
          ['01 / PROBLEM', project.problem],
          ['02 / APPROACH', project.approach],
          ['03 / WHAT I LEARNED', project.learned],
        ].map(([label, body]) => (
          <div key={label}>
            <div className="proj-section-label">{label}</div>
            <div className="proj-section-body">{body}</div>
          </div>
        ))}

        <div className="proj-section-label">04 / STACK</div>
        <div className="proj-section-body mono-sm" style={{color:'var(--t2)'}}>{project.stack.join(' / ')}</div>

        <div className="proj-section-label">05 / LINKS</div>
        <div className="proj-section-body" style={{display:'flex',gap:24}}>
          {project.links?.github && <button className="post-back" style={{fontSize:12}} onClick={e=>e.preventDefault()}>GITHUB ↗</button>}
          {project.links?.live && <button className="post-back" style={{fontSize:12}} onClick={e=>e.preventDefault()}>LIVE SITE ↗</button>}
        </div>

        <div className="proj-prev-next">
          {prev ? (
            <button className="proj-nav-btn" onClick={() => navigate('projects/'+prev.slug)}>← {prev.name.toUpperCase()}</button>
          ) : <span></span>}
          {next && (
            <button className="proj-nav-btn" onClick={() => navigate('projects/'+next.slug)}>{next.name.toUpperCase()} →</button>
          )}
        </div>
      </div>
      <Footer navigate={navigate} />
    </div>
  );
}

/* ─── READING PAGE ───────────────────────── */
function ReadingPage({ navigate }) {
  const { currentlyReading, recentFinishes, papers, avoiding } = SITE_DATA.reading;

  const ReadSection = ({ label, items, isBounced }) => (
    <div className="mb-48">
      <SectionHd label={label} />
      {items.map((item, i) => (
        isBounced ? (
          <div key={i} className="bounced-row">
            <span className="reading-num">{zeroPad(i+1)}</span>
            <div>
              <div className="bounced-title">{item.title}</div>
              <div className="bounced-meta">{item.author}{item.year ? ` · ${item.year}` : ''}{item.format ? ` · ${item.format.toUpperCase()}` : ''}</div>
              <div className="bounced-reason">{item.reason}</div>
            </div>
            <div className="bounced-reason-col">{item.reason}</div>
          </div>
        ) : (
          <div key={i} className="reading-row">
            <span className="reading-num">{zeroPad(i+1)}</span>
            <div>
              <div className="reading-title">{item.title}</div>
              <div className="reading-meta">{item.author}{item.year ? ` · ${item.year}` : ''}{item.format ? ` · ${item.format.toUpperCase()}` : ''}</div>
              {item.note && <div className="reading-note-inline">{item.note}</div>}
            </div>
            <div className="reading-note-col">{item.note || ''}</div>
          </div>
        )
      ))}
    </div>
  );

  return (
    <div className="page-wrap">
      <div className="outer">
        <div style={{marginBottom:48}}>
          <h1 className="h1 mb-8">READING</h1>
          <span className="mono-sm text-muted">03 / WHAT'S IN THE STACK</span>
        </div>
        <ReadSection label="01 / CURRENTLY READING" items={currentlyReading} />
        <ReadSection label="02 / FINISHED RECENTLY" items={recentFinishes} />
        <ReadSection label="03 / PAPERS WORTH YOUR TIME" items={papers} />
        {avoiding && <ReadSection label="04 / BOUNCED OFF" items={avoiding} isBounced={true} />}
      </div>
      <Footer navigate={navigate} />
    </div>
  );
}

/* ─── ROOT APP ───────────────────────────── */
function App() {
  const [page, setPage] = useState(() => sessionStorage.getItem('up_page2') || 'home');
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const navigate = useCallback(pg => {
    setPage(pg);
    sessionStorage.setItem('up_page2', pg);
    document.documentElement.scrollTop = 0;
  }, []);

  const renderPage = () => {
    if (page === 'home') return <HomePage navigate={navigate} tweaks={tweaks} />;
    if (page === 'writing') return <WritingPage navigate={navigate} tweaks={tweaks} />;
    if (page.startsWith('writing?filter=')) return <WritingPage navigate={navigate} tweaks={tweaks} initialFilter={page.replace('writing?filter=','')} />;
    if (page.startsWith('writing/')) return <PostPage slug={page.replace('writing/','')} navigate={navigate} />;
    if (page === 'projects') return <ProjectsPage navigate={navigate} />;
    if (page.startsWith('projects/')) return <ProjectDetailPage slug={page.replace('projects/','')} navigate={navigate} />;
    if (page === 'reading') return <ReadingPage navigate={navigate} />;
    if (page === 'about') return <AboutPage navigate={navigate} />;
    return <HomePage navigate={navigate} tweaks={tweaks} />;
  };

  return (
    <>
      <Nav page={page} navigate={navigate} tweaks={tweaks} />
      {renderPage()}
      <TweaksPanel>
        <TweakSection label="Layout" />
        <TweakToggle label="Show excerpts on /writing" value={tweaks.showExcerpts} onChange={v => setTweak('showExcerpts', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
