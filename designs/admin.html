<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — Utkarsh Panchal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;width:100%;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:#f5f5f7; color:#0a0a0f;
  -webkit-font-smoothing:antialiased;
  font-size:14px; line-height:1.5;
}

/* ─── TOKENS ─────────────────────────────── */
:root{
  --bg:#f5f5f7;
  --surface:#ffffff;
  --sidebar:#0d0d12;
  --sidebar-hover:#1a1a22;
  --sidebar-active:#1d4ed8;
  --t1:#0a0a0f;
  --t2:#5a5a66;
  --t3:#9a9aa6;
  --border:#e1e1e6;
  --border-strong:#c8c8d0;
  --accent:#1d4ed8;
  --accent-h:#2563eb;
  --accent-light:#eff4ff;
  --danger:#dc2626;
  --danger-light:#fef2f2;
  --success:#16a34a;
  --success-light:#f0fdf4;
  --warning:#d97706;
  --warning-light:#fffbeb;
  --topbar-h:48px;
  --sidebar-w:220px;
}

/* ─── LAYOUT SHELL ───────────────────────── */
.shell{display:flex; height:100vh; overflow:hidden;}
.sidebar{
  width:var(--sidebar-w); flex-shrink:0;
  background:var(--sidebar);
  display:flex; flex-direction:column;
  overflow-y:auto; overflow-x:hidden;
  scrollbar-width:none;
}
.sidebar::-webkit-scrollbar{display:none;}
.main{flex:1; display:flex; flex-direction:column; overflow:hidden;}
.topbar{
  height:var(--topbar-h); flex-shrink:0;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center;
  padding:0 28px; justify-content:space-between;
}
.content{flex:1; overflow-y:auto; padding:28px;}

/* ─── SIDEBAR INTERNALS ──────────────────── */
.sidebar-brand{
  padding:0 20px;
  height:var(--topbar-h); flex-shrink:0;
  display:flex; align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.sidebar-brand-text{
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:500;
  letter-spacing:0.1em; text-transform:uppercase;
  color:#ffffff;
}
.sidebar-brand-text span{color:var(--accent); margin-right:6px;}
.sidebar-section-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px; font-weight:500;
  letter-spacing:0.12em; text-transform:uppercase;
  color:rgba(255,255,255,0.25);
  padding:18px 20px 6px;
}
.sidebar-link{
  display:flex; align-items:center; gap:10px;
  padding:8px 20px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:500;
  letter-spacing:0.08em; text-transform:uppercase;
  color:rgba(255,255,255,0.55);
  cursor:pointer; border:none; background:none;
  width:100%; text-align:left;
  transition:color 80ms, background 80ms;
  position:relative;
}
.sidebar-link:hover{background:var(--sidebar-hover); color:rgba(255,255,255,0.85);}
.sidebar-link.active{
  background:var(--sidebar-active);
  color:#ffffff;
}
.sidebar-link.active::before{
  content:'';
  position:absolute; left:0; top:0; bottom:0;
  width:2px; background:#93c5fd;
}
.sidebar-icon{
  width:14px; height:14px; flex-shrink:0; opacity:0.7;
}
.sidebar-link.active .sidebar-icon{opacity:1;}
.sidebar-badge{
  margin-left:auto;
  font-family:'JetBrains Mono',monospace;
  font-size:9px; font-weight:500;
  background:rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.5);
  padding:1px 6px; border-radius:0;
}
.sidebar-link.active .sidebar-badge{background:rgba(255,255,255,0.2); color:#fff;}

/* ─── TOPBAR ─────────────────────────────── */
.topbar-title{
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:500;
  letter-spacing:0.1em; text-transform:uppercase;
  color:var(--t2);
  display:flex; align-items:center; gap:8px;
}
.topbar-title strong{color:var(--t1);}
.topbar-title .sep{color:var(--border-strong);}
.topbar-right{display:flex; align-items:center; gap:16px;}
.topbar-link{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; font-weight:500;
  letter-spacing:0.1em; text-transform:uppercase;
  color:var(--accent); background:none; border:none;
  cursor:pointer; transition:color 80ms; padding:0;
}
.topbar-link:hover{color:var(--accent-h);}
.topbar-user{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--t3);
}

/* ─── PAGE HEADER ─────────────────────────── */
.page-header{
  display:flex; align-items:flex-start; justify-content:space-between;
  margin-bottom:24px; gap:16px; flex-wrap:wrap;
}
.page-title{
  font-family:'JetBrains Mono',monospace;
  font-size:13px; font-weight:500;
  letter-spacing:0.1em; text-transform:uppercase;
  color:var(--t1);
}
.breadcrumb{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--t3); margin-top:4px;
  display:flex; align-items:center; gap:6px;
}
.breadcrumb .bc-link{color:var(--accent); cursor:pointer; background:none; border:none; padding:0; font:inherit; letter-spacing:inherit;}
.breadcrumb .bc-link:hover{text-decoration:underline;}

/* ─── BUTTONS ─────────────────────────────── */
.btn{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; font-weight:500;
  letter-spacing:0.1em; text-transform:uppercase;
  border:none; cursor:pointer; padding:7px 14px;
  transition:background 80ms, color 80ms;
  white-space:nowrap; display:inline-flex; align-items:center; gap:6px;
}
.btn-primary{background:var(--accent); color:#fff;}
.btn-primary:hover{background:var(--accent-h);}
.btn-ghost{background:transparent; color:var(--t2); border:1px solid var(--border-strong);}
.btn-ghost:hover{border-color:var(--t2); color:var(--t1);}
.btn-danger{background:var(--danger); color:#fff;}
.btn-danger:hover{background:#b91c1c;}
.btn-sm{padding:4px 10px; font-size:9px;}

/* ─── CARDS ──────────────────────────────── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  padding:20px;
}
.card-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px; font-weight:500;
  letter-spacing:0.12em; text-transform:uppercase;
  color:var(--t3); margin-bottom:8px;
}

/* ─── STAT CARDS ─────────────────────────── */
.stats-row{display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--border); margin-bottom:20px;}
.stat-card{
  background:var(--surface);
  padding:20px 24px;
  position:relative;
}
.stat-card::after{
  content:''; position:absolute; bottom:0; left:24px; right:24px;
  height:2px; background:transparent; transition:background 150ms;
}
.stat-card:hover::after{background:var(--accent);}
.stat-num{
  font-family:'JetBrains Mono',monospace;
  font-size:36px; font-weight:400; letter-spacing:-0.02em;
  color:var(--t1); line-height:1; margin-bottom:8px;
}
.stat-num.accent{color:var(--accent);}
.stat-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px; font-weight:500;
  letter-spacing:0.12em; text-transform:uppercase;
  color:var(--t3);
}
.stat-delta{
  font-family:'JetBrains Mono',monospace;
  font-size:9px; letter-spacing:0.06em; text-transform:uppercase;
  margin-top:6px;
}
.stat-delta.up{color:var(--success);}
.stat-delta.neutral{color:var(--t3);}

/* ─── TABLE ──────────────────────────────── */
.table-wrap{background:var(--surface); border:1px solid var(--border); overflow:hidden;}
.table-header{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px 13px;
  border-bottom:1px solid var(--border);
  gap:12px; flex-wrap:wrap;
}
.table-title{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; font-weight:500;
  letter-spacing:0.1em; text-transform:uppercase;
  color:var(--t1);
}
.table-meta{
  font-family:'JetBrains Mono',monospace;
  font-size:9px; letter-spacing:0.06em; text-transform:uppercase;
  color:var(--t3);
}
.table-actions{display:flex; gap:8px; align-items:center;}
table{width:100%; border-collapse:collapse;}
thead tr{border-bottom:1px solid var(--border);}
th{
  font-family:'JetBrains Mono',monospace;
  font-size:9px; font-weight:500;
  letter-spacing:0.1em; text-transform:uppercase;
  color:var(--t3); padding:10px 20px;
  text-align:left; white-space:nowrap;
}
th:first-child{padding-left:20px;}
th:last-child{padding-right:20px;}
td{
  padding:12px 20px;
  border-bottom:1px solid var(--border);
  vertical-align:top;
  font-size:13px; color:var(--t1);
}
td:first-child{padding-left:20px;}
td:last-child{padding-right:20px;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:#f9f9fb;}
.td-mono{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:0.04em; color:var(--t3);
}
.td-title{font-size:13px; font-weight:500; color:var(--t1);}
.td-excerpt{font-size:12px; color:var(--t2); margin-top:2px; line-height:1.4;}
.row-actions{display:flex; gap:6px; align-items:center;}

/* ─── STATUS BADGES ──────────────────────── */
.badge{
  display:inline-block;
  font-family:'JetBrains Mono',monospace;
  font-size:9px; font-weight:500;
  letter-spacing:0.1em; text-transform:uppercase;
  padding:2px 7px; border:1px solid;
}
.badge-published{background:var(--success-light); color:var(--success); border-color:#bbf7d0;}
.badge-draft{background:var(--warning-light); color:var(--warning); border-color:#fde68a;}
.badge-archived{background:var(--bg); color:var(--t3); border-color:var(--border-strong);}
.badge-shipped{background:var(--accent-light); color:var(--accent); border-color:#bfdbfe;}
.badge-wip{background:var(--warning-light); color:var(--warning); border-color:#fde68a;}

/* ─── FORM CONTROLS ──────────────────────── */
.form-group{margin-bottom:16px;}
.form-label{
  display:block;
  font-family:'JetBrains Mono',monospace;
  font-size:9px; font-weight:500;
  letter-spacing:0.12em; text-transform:uppercase;
  color:var(--t3); margin-bottom:6px;
}
.form-input{
  width:100%;
  font-family:'Inter',sans-serif; font-size:13px; color:var(--t1);
  background:var(--surface);
  border:none; border-bottom:1px solid var(--border-strong);
  padding:6px 0; outline:none;
  transition:border-color 80ms;
}
.form-input:focus{border-bottom-color:var(--accent);}
.form-input::placeholder{color:var(--t3);}
.form-input-box{
  width:100%;
  font-family:'Inter',sans-serif; font-size:13px; color:var(--t1);
  background:var(--surface); border:1px solid var(--border);
  padding:8px 12px; outline:none; transition:border-color 80ms;
}
.form-input-box:focus{border-color:var(--accent);}
textarea.form-input-box{resize:vertical; min-height:100px; line-height:1.6;}
.form-hint{
  font-family:'JetBrains Mono',monospace;
  font-size:9px; letter-spacing:0.06em;
  color:var(--t3); margin-top:5px;
}
.form-row{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
.form-row-3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px;}

/* ─── INLINE EDIT STRIP ──────────────────── */
.currently-grid{
  display:grid; grid-template-columns:repeat(2,1fr);
  gap:1px; background:var(--border);
}
.currently-field{background:var(--surface); padding:16px 20px;}
.currently-key{
  font-family:'JetBrains Mono',monospace;
  font-size:9px; font-weight:500;
  letter-spacing:0.12em; text-transform:uppercase;
  color:var(--t3); margin-bottom:6px;
}
.currently-input{
  font-family:'Inter',sans-serif; font-size:14px; color:var(--t1);
  background:transparent; border:none; outline:none;
  border-bottom:1px solid transparent; width:100%;
  padding:2px 0; transition:border-color 80ms;
}
.currently-input:focus{border-bottom-color:var(--accent);}
.currently-input::placeholder{color:var(--t3);}

/* ─── ACTIVITY FEED ──────────────────────── */
.activity-item{
  display:grid; grid-template-columns:auto 1fr auto;
  gap:0 16px; align-items:start;
  padding:10px 20px; border-bottom:1px solid var(--border);
}
.activity-item:last-child{border-bottom:none;}
.activity-icon{
  width:24px; height:24px;
  background:var(--accent-light);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; margin-top:1px;
}
.activity-text{font-size:13px; color:var(--t1); line-height:1.4;}
.activity-sub{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:0.04em; text-transform:uppercase;
  color:var(--t3); margin-top:3px;
}
.activity-time{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; color:var(--t3); white-space:nowrap; padding-top:2px;
  letter-spacing:0.04em;
}

/* ─── TWO-COLUMN LAYOUT ──────────────────── */
.two-col{display:grid; grid-template-columns:1fr 340px; gap:20px; align-items:start;}
@media(max-width:1100px){.two-col{grid-template-columns:1fr;}}
@media(max-width:960px){.stats-row{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.stats-row{grid-template-columns:1fr; } .form-row,.form-row-3{grid-template-columns:1fr;} .currently-grid{grid-template-columns:1fr;}}

/* ─── SECTION RULE ───────────────────────── */
.section-rule{
  display:flex; align-items:center; gap:12px;
  margin:24px 0 16px;
}
.section-rule-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px; font-weight:500;
  letter-spacing:0.12em; text-transform:uppercase;
  color:var(--t3); white-space:nowrap; flex-shrink:0;
}
.section-rule-line{flex:1; height:1px; background:var(--border);}

/* ─── CONFIG ROWS ─────────────────────────── */
.config-row{
  display:grid; grid-template-columns:200px 1fr;
  gap:0 32px; padding:16px 20px;
  border-bottom:1px solid var(--border);
  align-items:start;
}
.config-row:last-child{border-bottom:none;}
.config-key{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; font-weight:500;
  letter-spacing:0.1em; text-transform:uppercase;
  color:var(--t2); padding-top:4px;
}
.config-desc{
  font-family:'JetBrains Mono',monospace;
  font-size:9px; letter-spacing:0.04em;
  color:var(--t3); margin-top:4px;
}

/* ─── TOAST ──────────────────────────────── */
.toast{
  position:fixed; bottom:24px; right:24px;
  background:var(--t1); color:#fff;
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase;
  padding:10px 20px;
  display:flex; align-items:center; gap:8px;
  z-index:9999;
  animation:toastIn 200ms ease both;
}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.toast-dot{width:6px;height:6px;background:#4ade80;border-radius:50%;flex-shrink:0;}

/* ─── SEARCH ─────────────────────────────── */
.search-input{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:0.06em; text-transform:uppercase;
  background:var(--bg); border:1px solid var(--border);
  color:var(--t1); padding:5px 10px; outline:none;
  transition:border-color 80ms; width:180px;
}
.search-input::placeholder{color:var(--t3);}
.search-input:focus{border-color:var(--accent);}

/* ─── READING SECTIONS ───────────────────── */
.reading-section-header{
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 20px 9px;
  background:var(--bg); border-bottom:1px solid var(--border);
}
.reading-section-title{
  font-family:'JetBrains Mono',monospace;
  font-size:9px; font-weight:500;
  letter-spacing:0.12em; text-transform:uppercase;
  color:var(--t3);
}
.reading-entry-row{
  display:grid; grid-template-columns:1fr auto;
  gap:0 16px; padding:11px 20px;
  border-bottom:1px solid var(--border);
  align-items:center;
}
.reading-entry-row:last-child{border-bottom:none;}
.reading-entry-title{font-size:13px; font-weight:500; color:var(--t1);}
.reading-entry-meta{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; color:var(--t3); margin-top:2px; letter-spacing:0.04em;
}
.reading-entry-note{font-size:12px; font-style:italic; color:var(--t2); margin-top:3px;}
</style>
</head>

          <div className="table-wrap" key={sec.key}>
            <div className="table-header"><div className="table-title">{sec.label}</div></div>
            <div style={{padding:'16px 20px'}}>
              <textarea
                className="form-input-box"
                rows={5}
                value={sec.body}
                onChange={e => set(sec.key, e.target.value)}
              />
            </div>
          </div>
        ))}
        <div className="table-wrap">
          <div className="table-header"><div className="table-title">Contact Links</div></div>
          {[['Email','utkarsh@example.com'],['X / Twitter','@upanchal403'],['GitHub','github.com/upanchal'],['LinkedIn','linkedin.com/in/upanchal']].map(([label, val]) => (
            <div className="config-row" key={label}>
              <div className="config-key">{label}</div>
              <input className="form-input-box" defaultValue={val} />
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ─── APP ────────────────────────────────── */
function App() {
  const [page, setPage] = useState(() => sessionStorage.getItem('admin_page') || 'dashboard');
  const [toast, setToast] = useState(null);

  const nav = useCallback(p => { setPage(p); sessionStorage.setItem('admin_page', p); }, []);
  const showToast = useCallback(msg => { setToast(null); setTimeout(() => setToast(msg), 10); }, []);

  const renderPage = () => {
    switch(page) {
      case 'dashboard': return <Dashboard onNav={nav} showToast={showToast} />;
      case 'posts': return <PostsPage showToast={showToast} />;
      case 'projects': return <ProjectsPage showToast={showToast} />;
      case 'reading': return <ReadingPage showToast={showToast} />;
      case 'config': return <ConfigPage showToast={showToast} />;
      case 'about': return <AboutPage showToast={showToast} />;
      default: return <Dashboard onNav={nav} showToast={showToast} />;
    }
  };

  return (
    <div className="shell">
      <Sidebar active={page} onNav={nav} />
      <div className="main">
        <TopBar page={page} onNav={nav} />
        <div className="content">
          {renderPage()}
        </div>
      </div>
      {toast && <Toast key={toast + Date.now()} msg={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
