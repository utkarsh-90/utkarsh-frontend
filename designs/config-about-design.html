<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Site Config & About — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;width:100%;}
body{font-family:'Inter',system-ui,sans-serif;background:#f5f5f7;color:#0a0a0f;-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5;}
:root{
  --bg:#f5f5f7;--surface:#fff;
  --sidebar:#0d0d12;--sidebar-hover:#1a1a22;--sidebar-active:#1d4ed8;
  --t1:#0a0a0f;--t2:#5a5a66;--t3:#9a9aa6;
  --border:#e1e1e6;--border-s:#c8c8d0;
  --accent:#1d4ed8;--accent-h:#2563eb;--accent-lt:#eff4ff;
  --danger:#dc2626;--success:#16a34a;--success-lt:#f0fdf4;
  --sb-w:220px;--tb-h:48px;
}

/* ─── SHELL ──────────────────────────────── */
.shell{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:var(--sb-w);flex-shrink:0;background:var(--sidebar);display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:none;}
.sidebar::-webkit-scrollbar{display:none;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{height:var(--tb-h);flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;justify-content:space-between;}
.content{flex:1;overflow-y:auto;padding:0 28px 56px;}

/* ─── SIDEBAR ─────────────────────────────── */
.sb-brand{padding:0 20px;height:var(--tb-h);display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,.06);}
.sb-brand-text{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#fff;}
.sb-brand-text em{color:var(--accent);font-style:normal;margin-right:6px;}
.sb-sep{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.25);padding:18px 20px 6px;}
.sb-link{display:flex;align-items:center;gap:10px;padding:8px 20px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.55);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:color 80ms,background 80ms;position:relative;}
.sb-link:hover{background:var(--sidebar-hover);color:rgba(255,255,255,.85);}
.sb-link.active{background:var(--sidebar-active);color:#fff;}
.sb-link.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:#93c5fd;}
.sb-icon{width:14px;height:14px;flex-shrink:0;opacity:.7;}
.sb-link.active .sb-icon,.sb-link:hover .sb-icon{opacity:1;}
.sb-badge{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;background:rgba(255,255,255,.12);color:rgba(255,255,255,.5);padding:1px 6px;}
.sb-link.active .sb-badge{background:rgba(255,255,255,.2);color:#fff;}

/* ─── TOPBAR ─────────────────────────────── */
.tb-title{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--t2);display:flex;align-items:center;gap:8px;}
.tb-title strong{color:var(--t1);}
.tb-sep{color:var(--border-s);}
.tb-right{display:flex;align-items:center;gap:16px;}
.tb-link{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;}
.tb-link:hover{color:var(--accent-h);}

/* ─── BUTTONS ─────────────────────────────── */
.btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;padding:7px 14px;transition:background 80ms,color 80ms,border-color 80ms;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-h);}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--border-s);}
.btn-ghost:hover{border-color:var(--t2);color:var(--t1);}
.btn-sm{padding:5px 11px;font-size:9px;}
.btn-icon{background:none;border:none;cursor:pointer;color:var(--t3);padding:4px;display:flex;align-items:center;transition:color 80ms;}
.btn-icon:hover{color:var(--danger);}

/* ─── PAGE HEADER ─────────────────────────── */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;padding:24px 0 20px;flex-wrap:wrap;gap:12px;}
.ph-title{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--t1);}
.breadcrumb{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-top:4px;display:flex;align-items:center;gap:6px;}
.bc-link{color:var(--accent);cursor:pointer;background:none;border:none;padding:0;font:inherit;letter-spacing:inherit;}

/* ─── CARD ───────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);margin-bottom:20px;}
.card-head{padding:14px 20px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.card-title{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--t1);}
.card-sub{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);}
.card-body{padding:20px;}

/* ─── FORM FIELDS ─────────────────────────── */
.field-row{display:grid;grid-template-columns:160px 1fr;gap:0 32px;padding:14px 20px;border-bottom:1px solid var(--border);align-items:center;}
.field-row:last-child{border-bottom:none;}
.field-key{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--t2);}
.field-hint{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);letter-spacing:.04em;margin-top:3px;}
.field-input{
  width:100%;font-family:'Inter',sans-serif;font-size:14px;color:var(--t1);
  background:var(--bg);border:1px solid var(--border);
  padding:8px 12px;outline:none;transition:border-color 80ms;
}
.field-input:focus{border-color:var(--accent);}
.field-input::placeholder{color:var(--t3);}
.field-textarea{
  width:100%;font-family:'Inter',sans-serif;font-size:14px;color:var(--t1);
  background:var(--bg);border:1px solid var(--border);
  padding:10px 12px;outline:none;resize:vertical;min-height:110px;
  line-height:1.65;transition:border-color 80ms;
}
.field-textarea:focus{border-color:var(--accent);}
.field-textarea::placeholder{color:var(--t3);}
.section-label{
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;
  letter-spacing:.12em;text-transform:uppercase;color:var(--t3);
  margin-bottom:8px;display:block;
}

/* ─── META ROW PREVIEW ───────────────────── */
.preview-wrap{
  background:var(--surface);border:1px solid var(--border);
  margin-bottom:20px;overflow:hidden;
}
.preview-head{
  padding:12px 20px 11px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.preview-title{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--t1);}
.preview-live-badge{
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--success);background:var(--success-lt);border:1px solid #bbf7d0;padding:2px 7px;
  display:flex;align-items:center;gap:4px;
}
.preview-live-dot{width:5px;height:5px;border-radius:50%;background:var(--success);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* Faux browser chrome */
.preview-browser{background:#f0f0f3;border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;}
.chrome-dot{width:9px;height:9px;border-radius:50%;}
.chrome-bar{flex:1;background:#e4e4e8;height:20px;border-radius:0;display:flex;align-items:center;padding:0 10px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);letter-spacing:.04em;}

/* Faux site nav */
.preview-site-nav{
  background:#f5f5f7;
  border-bottom:2px solid #1d4ed8;
  height:40px;display:flex;align-items:center;
  padding:0 32px;justify-content:space-between;
}
.preview-site-logo{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:#0a0a0f;}
.preview-site-links{display:flex;gap:0;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#9a9aa6;}
.preview-site-links span{margin:0 5px;color:#e1e1e6;}

/* Meta rows grid */
.meta-rows-grid{background:#f5f5f7;border-bottom:1px solid var(--border);}
.meta-preview-row{
  display:flex;align-items:center;
  padding:7px 32px;
  border-bottom:1px solid #e8e8ec;
  gap:0;
}
.meta-preview-row:last-child{border-bottom:none;}
.meta-page-tag{
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;
  color:#9a9aa6;width:80px;flex-shrink:0;
}
.meta-preview-row.active-row .meta-page-tag{color:var(--accent);}
.meta-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:#9a9aa6;flex-shrink:0;letter-spacing:.06em;}
.meta-dots{flex:1;overflow:hidden;font-family:'JetBrains Mono',monospace;font-size:10px;color:#d0d0d8;letter-spacing:.03em;padding:0 8px;white-space:nowrap;}
.meta-status-text{font-family:'JetBrains Mono',monospace;font-size:10px;color:#5a5a66;flex-shrink:0;letter-spacing:.06em;}
.meta-preview-row.active-row .meta-status-text{color:#1d4ed8;}

/* ─── ABOUT TEXTAREAS ────────────────────── */
.about-section-block{padding:20px;border-bottom:1px solid var(--border);}
.about-section-block:last-child{border-bottom:none;}
.about-section-num{
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;
  letter-spacing:.12em;text-transform:uppercase;color:var(--t3);
  margin-bottom:6px;
}
.about-section-name{
  font-size:15px;font-weight:600;color:var(--t1);
  letter-spacing:-.01em;margin-bottom:10px;
}

/* ─── CONTACT LINKS ──────────────────────── */
.contact-list{background:var(--surface);border:1px solid var(--border);margin-bottom:20px;}
.contact-list-head{padding:12px 20px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.contact-row{
  display:grid;grid-template-columns:120px 1fr 36px;
  gap:0 8px;padding:10px 16px;border-bottom:1px solid var(--border);
  align-items:center;
}
.contact-row:last-child{border-bottom:none;}
.contact-label-input{
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  background:var(--bg);border:1px solid var(--border);
  color:var(--t1);padding:6px 8px;outline:none;width:100%;
  transition:border-color 80ms;
}
.contact-label-input:focus{border-color:var(--accent);}
.contact-url-input{
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.03em;
  background:var(--bg);border:1px solid var(--border);
  color:var(--t1);padding:6px 8px;outline:none;width:100%;
  transition:border-color 80ms;
}
.contact-url-input:focus{border-color:var(--accent);}
.contact-url-input::placeholder{color:var(--t3);}

/* ─── ADD ROW BTN ─────────────────────────── */
.add-row-btn{
  width:100%;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;
  background:none;border:1px dashed var(--border-s);color:var(--t3);
  cursor:pointer;padding:8px 16px;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:border-color 80ms,color 80ms;
}
.add-row-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ─── SAVE BAR ────────────────────────────── */
.save-bar{
  position:sticky;bottom:0;
  background:var(--surface);border-top:1px solid var(--border);
  padding:12px 20px;margin-top:8px;
  display:flex;align-items:center;justify-content:space-between;
  z-index:10;
}
.save-hint{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);}

/* ─── TOAST ──────────────────────────────── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--t1);color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:10px 20px;display:flex;align-items:center;gap:8px;z-index:9999;animation:toastIn 200ms ease both;}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.toast-dot{width:6px;height:6px;background:#4ade80;border-radius:50%;flex-shrink:0;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

/* ─── ICONS ──────────────────────────────── */
const PATHS = {
  grid:["M3 3h7v7H3zm11 0h7v7h-7zM3 14h7v7H3zm11 0h7v7h-7z"],
  file:["M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z","M14 2v6h6"],
  folder:["M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"],
  book:["M4 19.5A2.5 2.5 0 0 1 6.5 17H20","M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"],
  settings:["M12 20h9","M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"],
  user:["M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2","M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"],
  plus:["M12 5v14","M5 12h14"],
  x:["M18 6L6 18","M6 6l12 12"],
  check:["M20 6L9 17l-5-5"],
  save:["M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z","M17 21v-8H7v8","M7 3v5h8"],
  drag:["M9 3h1v1H9zm4 0h1v1h-1zM9 7h1v1H9zm4 0h1v1h-1zM9 11h1v1H9zm4 0h1v1h-1z"],
};
const Ic = ({d,size=14}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    {(Array.isArray(d)?d:[d]).map((p,i)=><path key={i} d={p}/>)}
  </svg>
);

/* ─── TOAST ──────────────────────────────── */
function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2200);return()=>clearTimeout(t);},[]);
  return <div className="toast"><span className="toast-dot"/>{msg}</div>;
}

/* ─── SIDEBAR ─────────────────────────────── */
const NAV=[
  {id:'dashboard',label:'Dashboard',icon:'grid'},
  {type:'sep',label:'Content'},
  {id:'posts',label:'Posts',icon:'file',badge:'8'},
  {id:'projects',label:'Projects',icon:'folder',badge:'4'},
  {id:'reading',label:'Reading',icon:'book',badge:'13'},
  {type:'sep',label:'Site'},
  {id:'config',label:'Site Config',icon:'settings'},
  {id:'about',label:'About',icon:'user'},
];
function Sidebar({active}){
  return (
    <div className="sidebar">
      <div className="sb-brand"><span className="sb-brand-text"><em>■</em>CMS</span></div>
      {NAV.map((item,i)=>item.type==='sep'?(
        <div key={i} className="sb-sep">{item.label}</div>
      ):(
        <button key={item.id} className={`sb-link${active===item.id?' active':''}`}>
          <svg className="sb-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
            {PATHS[item.icon].map((d,i)=><path key={i} d={d}/>)}
          </svg>
          {item.label}
          {item.badge&&<span className="sb-badge">{item.badge}</span>}
        </button>
      ))}
    </div>
  );
}

/* ─── META ROW PREVIEW ───────────────────── */
function MetaRowPreview({currently, activePage}){
  const today = new Date();
  const date = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
  const DOTS = '·'.repeat(40);
  const pages = [
    {id:'home',    label:'HOME',     status: `INDEX · 8 ESSAYS / 4 PROJECTS`},
    {id:'writing', label:'WRITING',  status: currently.writing ? `DRAFTING · ${currently.writing.toUpperCase()}` : 'DRAFTING · —'},
    {id:'projects',label:'PROJECTS', status: currently.building ? `BUILDING · ${currently.building.toUpperCase()}` : 'BUILDING · —'},
    {id:'reading', label:'READING',  status: currently.reading ? `NOW · READING ${currently.reading.toUpperCase()}` : 'NOW · READING —'},
    {id:'about',   label:'ABOUT',    status: currently.location ? `${currently.location.toUpperCase()} · CS @ ASU · OPEN TO 2026 ROLES` : 'LOCATION · CS @ ASU'},
  ];
  return (
    <div className="preview-wrap">
      <div className="preview-head">
        <span className="preview-title">Meta Row Preview — live as you type</span>
        <span className="preview-live-badge"><span className="preview-live-dot"></span>LIVE</span>
      </div>

      {/* Faux browser chrome */}
      <div className="preview-browser">
        <div className="chrome-dot" style={{background:'#ff5f56'}}/>
        <div className="chrome-dot" style={{background:'#ffbd2e'}}/>
        <div className="chrome-dot" style={{background:'#27c93f'}}/>
        <div className="chrome-bar">utkarshpanchal.com</div>
      </div>

      {/* Faux site nav */}
      <div className="preview-site-nav">
        <span className="preview-site-logo">UTKARSH PANCHAL</span>
        <div className="preview-site-links">
          WRITING<span>/</span>PROJECTS<span>/</span>READING<span>/</span>ABOUT
        </div>
      </div>

      {/* Meta rows for all pages */}
      <div className="meta-rows-grid">
        {pages.map(pg => (
          <div key={pg.id} className={`meta-preview-row${activePage===pg.id?' active-row':''}`}>
            <span className="meta-page-tag">{pg.label}</span>
            <span className="meta-date">{date}</span>
            <span className="meta-dots">{DOTS}</span>
            <span className="meta-status-text">{pg.status}</span>
          </div>
        ))}
      </div>

      <div style={{padding:'8px 20px',background:'var(--bg)',borderTop:'1px solid var(--border)'}}>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--t3)',letterSpacing:'.06em',textTransform:'uppercase'}}>
          ↑ EACH ROW SHOWS THE META STRIP AS IT APPEARS ON THAT PAGE
        </span>
      </div>
    </div>
  );
}

/* ─── SITE CONFIG PAGE ───────────────────── */
function SiteConfigPage({showToast}){
  const [currently, setCurrently] = useState({
    location: 'Phoenix, AZ',
    reading: 'The Alignment Problem',
    building: 'Context Window',
    writing: 'The Case Against Explainers',
  });
  const [activePage, setActivePage] = useState('home');
  const [dirty, setDirty] = useState(false);

  const set = (k,v) => { setCurrently(c=>({...c,[k]:v})); setDirty(true); };

  const fields = [
    { key:'location', label:'Location', hint:'Shown on the About page meta row', placeholder:'Phoenix, AZ', page:'about' },
    { key:'reading',  label:'Reading',  hint:'Currently reading — shown on Reading page meta row', placeholder:'Book title', page:'reading' },
    { key:'building', label:'Building', hint:'Current project — shown on Projects page meta row', placeholder:'Project name', page:'projects' },
    { key:'writing',  label:'Writing',  hint:'Current draft — shown on Writing page meta row', placeholder:'Essay title', page:'writing' },
  ];

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="ph-title">Site Config</div>
          <div className="breadcrumb"><button className="bc-link">Admin</button><span>/</span><span>Site Config</span></div>
        </div>
      </div>

      {/* Currently strip form */}
      <div className="card" style={{marginBottom:20}}>
        <div className="card-head">
          <div>
            <div className="card-title">Currently Strip</div>
            <div className="card-sub" style={{marginTop:3}}>Four fields that fill the meta row across the site — updates all pages instantly</div>
          </div>
        </div>
        {fields.map(f=>(
          <div
            className="field-row"
            key={f.key}
            onMouseEnter={()=>setActivePage(f.page)}
            onMouseLeave={()=>setActivePage('home')}
          >
            <div>
              <div className="field-key">{f.label}</div>
              <div className="field-hint">{f.hint}</div>
            </div>
            <input
              className="field-input"
              value={currently[f.key]}
              onChange={e=>set(f.key,e.target.value)}
              placeholder={f.placeholder}
              onFocus={()=>setActivePage(f.page)}
              onBlur={()=>setActivePage('home')}
            />
          </div>
        ))}
      </div>

      {/* Live preview */}
      <MetaRowPreview currently={currently} activePage={activePage} />

      {/* Save bar */}
      <div className="save-bar">
        <span className="save-hint">{dirty?'UNSAVED CHANGES':'ALL CHANGES SAVED'}</span>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost" onClick={()=>{setDirty(false);}}>DISCARD</button>
          <button className="btn btn-primary" onClick={()=>{showToast('SITE CONFIG SAVED');setDirty(false);}}>
            <Ic d={PATHS.save} size={11}/>SAVE CHANGES
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── ABOUT PAGE ─────────────────────────── */
let _id = 50;
const uid = () => ++_id;

function AboutPage({showToast}){

    {id:3, num:'03', label:'Why', body:"I'm building toward a career at the intersection of technical depth and strategic thinking — somewhere between research engineering and the kind of analysis that shapes product and policy decisions. The writing is the proof of work.\n\nThe longer arc: I want to understand the transition we're in — not just the technical side of AI, but the institutional, geopolitical, and philosophical dimensions."},
  ]);
  const [contacts, setContacts] = useState([
    {id:10,label:'EMAIL',   url:'utkarsh@example.com'},
    {id:11,label:'X / TWITTER', url:'https://x.com/upanchal403'},
    {id:12,label:'GITHUB',  url:'https://github.com/upanchal'},
    {id:13,label:'LINKEDIN',url:'https://linkedin.com/in/upanchal'},
    {id:14,label:'SUBSTACK',url:'https://upanchal.substack.com'},
  ]);

  const setSection = (id,body) => { setSections(s=>s.map(sec=>sec.id===id?{...sec,body}:sec)); setDirty(true); };
  const setContact = (id,k,v) => { setContacts(c=>c.map(ct=>ct.id===id?{...ct,[k]:v}:ct)); setDirty(true); };
  const addContact = () => { setContacts(c=>[...c,{id:uid(),label:'',url:''}]); setDirty(true); };
  const removeContact = (id) => { setContacts(c=>c.filter(ct=>ct.id!==id)); setDirty(true); };

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="ph-title">About</div>
          <div className="breadcrumb"><button className="bc-link">Admin</button><span>/</span><span>About</span></div>
        </div>
      </div>

      {/* Who / What / Why */}
      <div className="card" style={{marginBottom:20}}>
        <div className="card-head">
          <div>
            <div className="card-title">About Sections</div>
            <div className="card-sub" style={{marginTop:3}}>Three sections displayed on the /about page in order</div>
          </div>
        </div>
        {sections.map((sec,i)=>(

            key={sec.id}
            className="about-section-block"
            style={i===sections.length-1?{borderBottom:'none'}:{}}
          >
            <div style={{display:'grid',gridTemplateColumns:'80px 1fr',gap:'0 24px',alignItems:'start'}}>
              <div>
                <div className="about-section-num">{sec.num}</div>
                <div className="about-section-name">{sec.label}</div>
              </div>
              <div>
                <textarea
                  className="field-textarea"
                  value={sec.body}
                  onChange={e=>setSection(sec.id,e.target.value)}
                  rows={6}
                  placeholder={`Write the ${sec.label} section...`}
                />
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--t3)',letterSpacing:'.04em',marginTop:5,textAlign:'right'}}>
                  {sec.body.length} CHARS · {sec.body.trim()?sec.body.trim().split(/\s+/).length:0} WORDS
                </div>
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* Contact links */}
      <div className="contact-list">
        <div className="contact-list-head">
          <div>
            <div className="card-title">Contact Links</div>
            <div className="card-sub" style={{marginTop:3}}>Shown at the bottom of the About page</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={addContact}>
            <Ic d={PATHS.plus} size={10}/> ADD LINK
          </button>
        </div>

        {/* Column headers */}
        <div style={{display:'grid',gridTemplateColumns:'120px 1fr 36px',gap:'0 8px',padding:'7px 16px 6px',background:'var(--bg)',borderBottom:'1px solid var(--border)'}}>
          {['LABEL','URL / VALUE',''].map((h,i)=>(
            <div key={i} style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--t3)'}}>{h}</div>
          ))}
        </div>

        {contacts.map((ct,i)=>(
          <div key={ct.id} className="contact-row">
            <input
              className="contact-label-input"
              value={ct.label}
              onChange={e=>setContact(ct.id,'label',e.target.value)}
              placeholder="LABEL"
            />
            <input
              className="contact-url-input"
              value={ct.url}
              onChange={e=>setContact(ct.id,'url',e.target.value)}
              placeholder="https://... or email@domain.com"
            />

              <Ic d={PATHS.x} size={12}/>
            </button>
          </div>
        ))}

        <div style={{padding:'10px 16px',borderTop:'1px solid var(--border)'}}>
          <button className="add-row-btn" onClick={addContact}>
            <Ic d={PATHS.plus} size={11}/> ADD CONTACT LINK
          </button>

      </div>

      {/* Save bar */}
      <div className="save-bar">
        <span className="save-hint">{dirty?'UNSAVED CHANGES':'ALL CHANGES SAVED'}</span>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost" onClick={()=>setDirty(false)}>DISCARD</button>
          <button className="btn btn-primary" onClick={()=>{showToast('ABOUT PAGE SAVED');setDirty(false);}}>
            <Ic d={PATHS.save} size={11}/>SAVE CHANGES
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── APP ────────────────────────────────── */
function App(){
  const [page, setPage] = useState(()=>sessionStorage.getItem('sca_page')||'config');
  const [toast, setToast] = useState(null);
  const showToast = useCallback(msg=>{setToast(null);setTimeout(()=>setToast(msg),10);},[]);
  const nav = (p)=>{setPage(p);sessionStorage.setItem('sca_page',p);};

  const PAGE_NAMES = {config:'Site Config',about:'About'};

  return (
    <div className="shell">
      <Sidebar active={page}/>
      <div className="main">
        <div className="topbar">
          <div className="tb-title">
            <span>ADMIN</span><span className="tb-sep">/</span>
            <strong>UTKARSH PANCHAL</strong><span className="tb-sep">·</span>
            <span style={{color:'var(--t3)'}}>{PAGE_NAMES[page]?.toUpperCase()}</span>
          </div>
          <div className="tb-right">
            <div style={{display:'flex',gap:0,background:'var(--bg)',border:'1px solid var(--border)',padding:2}}>
              {['config','about'].map(p=>(
                <button
                  key={p}
                  style={{
                    fontFamily:"'JetBrains Mono',monospace",fontSize:9,fontWeight:500,
                    letterSpacing:'.1em',textTransform:'uppercase',
                    background:page===p?'var(--accent)':'transparent',
                    color:page===p?'#fff':'var(--t3)',
                    border:'none',cursor:'pointer',
                    padding:'5px 0',width:88,textAlign:'center',
                    transition:'background 80ms,color 80ms',
                  }}
                  onClick={()=>nav(p)}
                >
                  {p==='config'?'CONFIG':'ABOUT'}
                </button>
              ))}
            </div>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--t3)'}}>LOGGED IN AS UP</span>
            <button className="tb-link">VIEW SITE ↗</button>
          </div>
        </div>
        <div className="content">
          {page==='config' && <SiteConfigPage showToast={showToast}/>}
          {page==='about'  && <AboutPage showToast={showToast}/>}
        </div>
      </div>
      {toast&&<Toast key={toast+Date.now()} msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
