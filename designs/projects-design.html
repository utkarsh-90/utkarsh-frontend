<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Projects — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;width:100%;}
body{font-family:'Inter',system-ui,sans-serif;background:#f5f5f7;color:#0a0a0f;-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5;}

:root{
  --bg:#f5f5f7;--surface:#fff;
  --sidebar:#0d0d12;--sidebar-hover:#1a1a22;--sidebar-active:#1d4ed8;
  --t1:#0a0a0f;--t2:#5a5a66;--t3:#9a9aa6;
  --border:#e1e1e6;--border-s:#c8c8d0;
  --accent:#1d4ed8;--accent-h:#2563eb;--accent-lt:#eff4ff;
  --danger:#dc2626;--success:#16a34a;--success-lt:#f0fdf4;
  --warning:#d97706;--warning-lt:#fffbeb;
  --sb-w:220px;--tb-h:48px;--bb-h:56px;
}

/* ─── SHELL ──────────────────────────────── */
.shell{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:var(--sb-w);flex-shrink:0;background:var(--sidebar);display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:none;}
.sidebar::-webkit-scrollbar{display:none;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{height:var(--tb-h);flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;justify-content:space-between;}
.content{flex:1;overflow-y:auto;}

/* ─── SIDEBAR ─────────────────────────────── */
.sb-brand{padding:0 20px;height:var(--tb-h);display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,.06);}
.sb-brand-text{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#fff;}
.sb-brand-text span{color:var(--accent);margin-right:6px;}
.sb-sep{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.25);padding:18px 20px 6px;}
.sb-link{display:flex;align-items:center;gap:10px;padding:8px 20px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.55);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:color 80ms,background 80ms;position:relative;}
.sb-link:hover{background:var(--sidebar-hover);color:rgba(255,255,255,.85);}
.sb-link.active{background:var(--sidebar-active);color:#fff;}
.sb-link.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:#93c5fd;}
.sb-icon{width:14px;height:14px;flex-shrink:0;opacity:.7;}
.sb-link.active .sb-icon{opacity:1;}
.sb-badge{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;background:rgba(255,255,255,.12);color:rgba(255,255,255,.5);padding:1px 6px;}
.sb-link.active .sb-badge{background:rgba(255,255,255,.2);color:#fff;}

/* ─── TOPBAR ─────────────────────────────── */
.tb-title{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--t2);display:flex;align-items:center;gap:8px;}
.tb-title strong{color:var(--t1);}
.tb-sep{color:var(--border-s);}
.tb-right{display:flex;align-items:center;gap:16px;}
.tb-link{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;}
.tb-link:hover{color:var(--accent-h);}

/* ─── BUTTONS ─────────────────────────────── */
.btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;padding:7px 14px;transition:background 80ms,color 80ms,border-color 80ms;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-h);}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--border-s);}
.btn-ghost:hover{border-color:var(--t2);color:var(--t1);}
.btn-sm{padding:4px 10px;font-size:9px;}
.btn-icon{background:none;border:1px solid var(--border);color:var(--t3);cursor:pointer;padding:5px 7px;display:inline-flex;align-items:center;justify-content:center;transition:color 80ms,border-color 80ms;}
.btn-icon:hover{color:var(--t1);border-color:var(--border-s);}
.btn-danger-text{background:none;border:none;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--danger);cursor:pointer;padding:7px 0;}
.btn-danger-text:hover{text-decoration:underline;}

/* ─── STATUS BADGES ──────────────────────── */
.badge{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border:1px solid;}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.badge-shipped{background:var(--accent-lt);color:var(--accent);border-color:#bfdbfe;}
.badge-shipped::before{background:var(--accent);}
.badge-wip{background:#f8f8f8;color:var(--t2);border-color:var(--border-s);}
.badge-wip::before{background:var(--t3);}
.badge-archived{background:var(--bg);color:var(--t3);border-color:var(--border);}
.badge-archived::before{background:var(--border-s);}

/* ─── PAGE HEADER ─────────────────────────── */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;padding:24px 28px 20px;flex-wrap:wrap;gap:12px;}
.ph-title{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--t1);}
.breadcrumb{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-top:4px;display:flex;align-items:center;gap:6px;}
.bc-link{color:var(--accent);cursor:pointer;background:none;border:none;padding:0;font:inherit;letter-spacing:inherit;}
.bc-link:hover{text-decoration:underline;}

/* ─── PROJECT LIST ROW ───────────────────── */
.proj-list-wrap{padding:0 28px 32px;}
.proj-list-tbl{background:var(--surface);border:1px solid var(--border);}
.proj-list-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);}
.proj-list-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--t1);}
.proj-list-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;}

.proj-row{
  display:grid;
  grid-template-columns:16px 40px 1fr auto auto;
  gap:0 16px;
  align-items:center;
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:background 80ms;
  position:relative;
}
.proj-row:last-child{border-bottom:none;}
.proj-row:hover{background:#f9f9fb;}
.proj-row.drag-over{background:var(--accent-lt);border-top:2px solid var(--accent);}
.proj-row.dragging{opacity:.4;}

/* Drag handle */
.drag-handle{
  color:var(--border-s);cursor:grab;flex-shrink:0;
  display:flex;flex-direction:column;gap:2px;align-items:center;
  padding:4px 2px;opacity:0;transition:opacity 80ms,color 80ms;
}
.proj-row:hover .drag-handle{opacity:1;}
.drag-handle:active{cursor:grabbing;color:var(--accent);}
.drag-dot{width:3px;height:3px;border-radius:50%;background:currentColor;}

/* Row number */
.proj-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:.04em;text-align:right;flex-shrink:0;}

/* Row main */
.proj-row-main{min-width:0;}
.proj-name{font-size:15px;font-weight:600;color:var(--t1);letter-spacing:-.01em;margin-bottom:4px;transition:color 80ms;}
.proj-row:hover .proj-name{color:var(--accent);}
.proj-desc{font-size:13px;color:var(--t2);line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.stack-tags{display:flex;flex-wrap:wrap;gap:4px;}
.stack-tag{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);background:var(--bg);border:1px solid var(--border);padding:2px 7px;}

/* Row actions */
.proj-row-badge{flex-shrink:0;}
.proj-row-actions{display:flex;gap:4px;opacity:0;transition:opacity 80ms;flex-shrink:0;}
.proj-row:hover .proj-row-actions{opacity:1;}

/* ─── EDITOR SHELL ───────────────────────── */
.editor-shell{display:flex;flex-direction:column;height:100%;}
.editor-topbar{height:var(--tb-h);flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;justify-content:space-between;gap:16px;}
.editor-main{flex:1;display:flex;min-height:0;overflow:hidden;}
.editor-body{flex:1;overflow-y:auto;padding:32px 40px;min-width:0;}
.editor-sidebar{width:272px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);overflow-y:auto;display:flex;flex-direction:column;}
.editor-bottom-bar{height:var(--bb-h);flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;}

/* ─── EDITOR FIELDS ──────────────────────── */
.editor-name-input{
  width:100%;font-family:'Inter',sans-serif;font-size:28px;font-weight:600;
  color:var(--t1);background:transparent;border:none;outline:none;
  line-height:1.2;letter-spacing:-.02em;
  border-bottom:2px solid transparent;transition:border-color 150ms;
  padding-bottom:8px;
}
.editor-name-input:focus{border-bottom-color:var(--accent);}
.editor-name-input::placeholder{color:var(--t3);}
.field-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;}
.field-section{margin-bottom:28px;}
.field-input{width:100%;font-family:'Inter',sans-serif;font-size:14px;color:var(--t1);background:var(--bg);border:1px solid var(--border);padding:9px 12px;outline:none;transition:border-color 80ms;line-height:1.5;}
.field-input:focus{border-color:var(--accent);}
.field-input::placeholder{color:var(--t3);}
.field-textarea{width:100%;font-family:'Inter',sans-serif;font-size:14px;color:var(--t1);background:var(--bg);border:1px solid var(--border);padding:12px 14px;outline:none;transition:border-color 80ms;resize:vertical;line-height:1.65;}
.field-textarea:focus{border-color:var(--accent);}
.field-textarea::placeholder{color:var(--t3);}
.field-textarea.sm{min-height:80px;}
.field-textarea.md{min-height:120px;}
.field-textarea.lg{min-height:160px;}
.section-divider{height:1px;background:var(--border);margin:32px 0;}
.section-title{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--t2);margin-bottom:20px;display:flex;align-items:center;gap:12px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* ─── SEGMENTED CONTROL ──────────────────── */
.seg-ctrl{display:flex;gap:0;background:var(--border);}
.seg-opt{flex:1;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;background:var(--surface);border:none;cursor:pointer;padding:8px 0;text-align:center;color:var(--t3);transition:color 80ms,background 80ms;}
.seg-opt:hover{color:var(--t2);}
.seg-opt.active-shipped{background:var(--accent);color:#fff;}
.seg-opt.active-wip{background:#4b5563;color:#fff;}
.seg-opt.active-archived{background:var(--t3);color:#fff;}

/* ─── TAG INPUT ──────────────────────────── */
.tag-input-wrap{
  display:flex;flex-wrap:wrap;gap:6px;align-items:center;
  background:var(--bg);border:1px solid var(--border);
  padding:7px 10px;cursor:text;transition:border-color 80ms;
  min-height:40px;
}
.tag-input-wrap:focus-within{border-color:var(--accent);}
.chip{
  display:inline-flex;align-items:center;gap:4px;
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;
  letter-spacing:.06em;text-transform:uppercase;
  color:var(--accent);background:var(--accent-lt);border:1px solid #bfdbfe;
  padding:3px 8px;
}
.chip-del{background:none;border:none;cursor:pointer;color:var(--accent);opacity:.6;padding:0;line-height:1;font-size:11px;display:flex;align-items:center;}
.chip-del:hover{opacity:1;}
.tag-text-input{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;background:transparent;border:none;outline:none;color:var(--t1);min-width:80px;flex:1;}
.tag-text-input::placeholder{color:var(--t3);text-transform:uppercase;}
.tag-hint{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);letter-spacing:.04em;margin-top:5px;}

/* ─── SIDEBAR INTERNALS ──────────────────── */
.esb-section{padding:16px 20px;border-bottom:1px solid var(--border);}
.esb-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;display:block;}
.esb-input{width:100%;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.04em;color:var(--t1);background:var(--bg);border:1px solid var(--border);padding:6px 8px;outline:none;transition:border-color 80ms;}
.esb-input:focus{border-color:var(--accent);}
.esb-input::placeholder{color:var(--t3);}
.esb-meta-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.esb-meta-key{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);}
.esb-meta-val{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t2);}
.link-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.link-prefix{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);flex-shrink:0;letter-spacing:.04em;}
.link-input{flex:1;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.04em;color:var(--t1);background:var(--bg);border:1px solid var(--border);padding:5px 8px;outline:none;transition:border-color 80ms;}
.link-input:focus{border-color:var(--accent);}
.link-input::placeholder{color:var(--t3);}

/* ─── TOAST ──────────────────────────────── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--t1);color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:10px 20px;display:flex;align-items:center;gap:8px;z-index:9999;animation:toastIn 200ms ease both;}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.toast-dot{width:6px;height:6px;background:#4ade80;border-radius:50%;flex-shrink:0;}

/* ─── EMPTY STATE ─────────────────────────── */
.drag-note{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

/* ─── DATA ───────────────────────────────── */
const INIT_PROJECTS = [
  { id:1, name:"Context Window", slug:"context-window", status:"shipped",
    desc:"A Substack-integrated newsletter tool that auto-summarizes long-form AI papers into a weekly digest.",
    stack:["Next.js","OpenAI API","Resend","PlanetScale"],
    problem:"AI paper output has become impossible to track. Researchers publish dozens of significant papers a week.",
    approach:"Each paper goes through a two-stage pipeline: a structured extraction prompt that pulls out key claims, methodology, and limitations; then a synthesis step that connects it to papers from the previous 90 days.",
    learned:"Rate limiting LLM calls at scale is genuinely hard. Most users want less than you think. The version with 10 features had worse engagement than the version with 2.",
    github:"https://github.com/upanchal/context-window", live:"https://contextwindow.dev" },
  { id:2, name:"Latent Space Explorer", slug:"latent-space-explorer", status:"wip",
    desc:"Interactive visualization of word embedding spaces. Drag tokens around, see semantic neighborhoods, watch analogies resolve in real time.",
    stack:["React","Three.js","FastAPI","UMAP"],
    problem:"Embedding spaces are conceptually central to modern ML but almost nobody has an intuitive feel for them.",
    approach:"Project high-dimensional embeddings to 3D with UMAP, render with Three.js, allow real-time token injection and nearest-neighbor highlighting.",
    learned:"Three.js performance with 50k points is manageable. 500k is not. UMAP is slow — pre-compute everything.",
    github:"https://github.com/upanchal/latent-viz", live:"" },
  { id:3, name:"Polemic", slug:"polemic", status:"shipped",
    desc:"A minimal Markdown-based blogging engine with first-class support for academic citations, footnotes, and sidenotes.",
    stack:["Rust","SQLite","HTMX","Pandoc"],
    problem:"Every blogging platform makes the same tradeoffs: rich editor or Markdown, but not both done well.",
    approach:"Pandoc as the rendering engine gives you 20 years of typographic work for free. Wrap it in a thin Rust server with SQLite.",
    learned:"Rust is genuinely fast. HTMX is underrated for content sites where full SPAs are overkill.",
    github:"https://github.com/upanchal/polemic", live:"https://polemic.sh" },
  { id:4, name:"Market Microstructure Viz", slug:"market-microstructure-viz", status:"archived",
    desc:"Real-time order book visualization for crypto markets. Built to understand how liquidity actually works at the millisecond level.",
    stack:["Python","WebSockets","D3.js","Redis"],
    problem:"Understanding order books from static textbook diagrams is like learning to swim from a book.",
    approach:"Stream WebSocket data from exchange APIs, buffer in Redis, push to frontend via SSE, visualize with D3.",
    learned:"WebSocket data is extremely noisy. The interesting signal is in the aggregation, not the raw feed.",
    github:"https://github.com/upanchal/mmviz", live:"" },
];
const titleToSlug = t => t.toLowerCase().replace(/[''"]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');

/* ─── ICONS ──────────────────────────────── */
const Ic = ({d, size=14}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    {(Array.isArray(d)?d:[d]).map((p,i)=><path key={i} d={p}/>)}
  </svg>
);
const IC = {
  grid:["M3 3h7v7H3zm11 0h7v7h-7zM3 14h7v7H3zm11 0h7v7h-7z"],
  file:["M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z","M14 2v6h6"],
  folder:["M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"],
  book:["M4 19.5A2.5 2.5 0 0 1 6.5 17H20","M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"],
  settings:["M12 20h9","M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"],
  user:["M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2","M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"],
  plus:["M12 5v14","M5 12h14"],
  trash:["M3 6h18","M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"],
  arrow_l:["M19 12H5","M12 19l-7-7 7-7"],
  ext:["M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6","M15 3h6v6","M10 14L21 3"],
};

/* ─── TOAST ──────────────────────────────── */
function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2200);return()=>clearTimeout(t);},[]);
  return <div className="toast"><span className="toast-dot"></span>{msg}</div>;
}

/* ─── SIDEBAR ─────────────────────────────── */
const NAV=[
  {id:'dashboard',label:'Dashboard',icon:'grid'},
  {type:'sep',label:'Content'},
  {id:'posts',label:'Posts',icon:'file',badge:'8'},
  {id:'projects',label:'Projects',icon:'folder',badge:'4'},
  {id:'reading',label:'Reading',icon:'book',badge:'13'},
  {type:'sep',label:'Site'},
  {id:'config',label:'Site Config',icon:'settings'},
  {id:'about',label:'About',icon:'user'},
];
function Sidebar({active}){
  return (
    <div className="sidebar">
      <div className="sb-brand"><span className="sb-brand-text"><span>■</span>CMS</span></div>
      {NAV.map((item,i)=>item.type==='sep'?(
        <div key={i} className="sb-sep">{item.label}</div>
      ):(
        <button key={item.id} className={`sb-link${active===item.id?' active':''}`}>
          <svg className="sb-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
            {IC[item.icon].map((d,i)=><path key={i} d={d}/>)}
          </svg>
          {item.label}
          {item.badge&&<span className="sb-badge">{item.badge}</span>}
        </button>
      ))}
    </div>
  );
}

/* ─── TAG INPUT COMPONENT ────────────────── */
function TagInput({tags, onChange}){
  const [input, setInput] = useState('');
  const inputRef = useRef(null);
  const addTag = (val) => {
    const trimmed = val.trim().replace(/,$/,'').trim();
    if(trimmed && !tags.includes(trimmed)){
      onChange([...tags, trimmed]);
    }
    setInput('');
  };
  const handleKey = (e) => {
    if(e.key==='Enter'||e.key===','){e.preventDefault();addTag(input);}
    if(e.key==='Backspace'&&input===''&&tags.length>0){
      onChange(tags.slice(0,-1));
    }
  };
  const removeTag = (i) => onChange(tags.filter((_,idx)=>idx!==i));
  return (
    <div>
      <div className="tag-input-wrap" onClick={()=>inputRef.current?.focus()}>
        {tags.map((tag,i)=>(
          <span className="chip" key={i}>
            {tag}
            <button className="chip-del" onClick={(e)=>{e.stopPropagation();removeTag(i);}}>×</button>
          </span>
        ))}
        <input
          ref={inputRef}
          className="tag-text-input"
          value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={handleKey}
          onBlur={()=>{if(input.trim())addTag(input);}}
          placeholder={tags.length===0?"Next.js, React…":""}
        />
      </div>
      <div className="tag-hint">PRESS ENTER OR COMMA TO ADD · BACKSPACE TO REMOVE</div>
    </div>
  );
}

/* ─── DRAG HANDLE ────────────────────────── */
function DragHandle(){
  return (
    <div className="drag-handle">
      {[0,1,2,3,4,5].map(i=><div key={i} className="drag-dot"/>)}
    </div>
  );
}

/* ─── SCREEN 1: PROJECTS LIST ────────────── */
function ProjectsList({onEdit, onNew, showToast}){
  const [projects, setProjects] = useState(INIT_PROJECTS);
  const [dragIdx, setDragIdx] = useState(null);
  const [overIdx, setOverIdx] = useState(null);
  const [filter, setFilter] = useState('all');

  const statusCount = (s) => s==='all' ? projects.length : projects.filter(p=>p.status===s).length;
  const FILTERS = ['all','shipped','wip','archived'];
  const FILTER_LABELS = {all:'All',shipped:'Shipped',wip:'In Progress',archived:'Archived'};
  const filtered = filter==='all' ? projects : projects.filter(p=>p.status===filter);

  const handleDragStart = (e, i) => {
    setDragIdx(i);
    e.dataTransfer.effectAllowed = 'move';
  };
  const handleDragOver = (e, i) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if(i !== overIdx) setOverIdx(i);
  };
  const handleDrop = (e, i) => {
    e.preventDefault();
    if(dragIdx === null || dragIdx === i) { setDragIdx(null); setOverIdx(null); return; }
    const arr = [...projects];
    const [moved] = arr.splice(dragIdx, 1);
    arr.splice(i, 0, moved);
    setProjects(arr);
    setDragIdx(null); setOverIdx(null);
    showToast('ORDER UPDATED');
  };
  const handleDragEnd = () => { setDragIdx(null); setOverIdx(null); };

  return (
    <div className="editor-shell">
      <div className="content" style={{padding:0}}>
        <div className="page-header">
          <div>
            <div className="ph-title">Projects</div>
            <div className="breadcrumb">
              <button className="bc-link">Admin</button><span>/</span><span>Projects</span>
            </div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span className="drag-note">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M12 5v14M5 12h14"/></svg>
              DRAG TO REORDER
            </span>
            <button className="btn btn-primary" onClick={onNew}>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
              NEW PROJECT
            </button>
          </div>
        </div>

        <div className="proj-list-wrap">
          {/* Filter tabs */}
          <div style={{display:'flex',alignItems:'center',gap:0,borderBottom:'1px solid var(--border)',marginBottom:0,background:'var(--surface)',borderLeft:'1px solid var(--border)',borderRight:'1px solid var(--border)',borderTop:'1px solid var(--border)'}}>
            {FILTERS.map((f,i)=>(
              <React.Fragment key={f}>
                <button
                  style={{
                    fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:500,
                    letterSpacing:'.08em',textTransform:'uppercase',
                    background:'none',border:'none',
                    borderBottom: filter===f ? '2px solid var(--accent)' : '2px solid transparent',
                    color: filter===f ? 'var(--accent)' : 'var(--t3)',
                    padding:'10px 16px',cursor:'pointer',whiteSpace:'nowrap',
                    marginBottom:'-1px',transition:'color 80ms',
                  }}
                  onClick={()=>setFilter(f)}
                >
                  {FILTER_LABELS[f]}
                  <span style={{marginLeft:6,fontSize:9,opacity:.7}}>{statusCount(f)}</span>
                </button>
                {i < FILTERS.length-1 && <div style={{width:1,height:16,background:'var(--border)',flexShrink:0}}/>}
              </React.Fragment>
            ))}
          </div>

          <div className="proj-list-tbl" style={{borderTop:'none'}}>
            <div className="proj-list-header">
              <span className="proj-list-label">{filter==='all'?'All Projects':`${FILTER_LABELS[filter]} (${filtered.length})`}</span>
              <span className="proj-list-meta">{projects.filter(p=>p.status==='shipped').length} SHIPPED · {projects.filter(p=>p.status==='wip').length} WIP · {projects.filter(p=>p.status==='archived').length} ARCHIVED</span>
            </div>

            {filtered.map((proj, i) => {
              const origIdx = projects.indexOf(proj);
              return (
                <div
                  key={proj.id}
                  className={`proj-row${dragIdx===origIdx?' dragging':''}${overIdx===origIdx?' drag-over':''}`}
                  draggable
                  onDragStart={e=>handleDragStart(e,origIdx)}
                  onDragOver={e=>handleDragOver(e,origIdx)}
                  onDrop={e=>handleDrop(e,origIdx)}
                  onDragEnd={handleDragEnd}
                  onClick={()=>onEdit(proj)}
                >
                  <div onClick={e=>e.stopPropagation()} style={{cursor:'grab'}} onMouseDown={e=>e.stopPropagation()}>
                    <DragHandle />
                  </div>
                  <div className="proj-num">{String(i+1).padStart(2,'0')}</div>
                  <div className="proj-row-main">
                    <div className="proj-name">{proj.name}</div>
                    <div className="proj-desc">{proj.desc}</div>
                    <div className="stack-tags">
                      {proj.stack.map(t=><span key={t} className="stack-tag">{t}</span>)}
                    </div>
                  </div>
                  <div className="proj-row-badge">
                    <span className={`badge badge-${proj.status}`}>
                      {proj.status==='wip'?'IN PROGRESS':proj.status.toUpperCase()}
                    </span>
                  </div>
                  <div className="proj-row-actions" onClick={e=>e.stopPropagation()}>
                    <button className="btn btn-ghost btn-sm" onClick={()=>onEdit(proj)}>EDIT</button>
                    <button className="btn-icon btn-sm" onClick={()=>showToast('PROJECT DELETED')} title="Delete">
                      <Ic d={IC.trash} size={12}/>
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── SCREEN 2: PROJECT EDITOR ───────────── */
function ProjectEditor({project, onBack, showToast}){
  const isNew = !project;
  const [name, setName] = useState(project?.name||'');
  const [slug, setSlug] = useState(project?.slug||'');
  const [slugEdited, setSlugEdited] = useState(!!project);
  const [status, setStatus] = useState(project?.status||'wip');
  const [desc, setDesc] = useState(project?.desc||'');
  const [stack, setStack] = useState(project?.stack||[]);
  const [problem, setProblem] = useState(project?.problem||'');
  const [approach, setApproach] = useState(project?.approach||'');
  const [learned, setLearned] = useState(project?.learned||'');
  const [github, setGithub] = useState(project?.github||'');
  const [live, setLive] = useState(project?.live||'');
  const [saved, setSaved] = useState(false);

  useEffect(()=>{
    if(!slugEdited && name) setSlug(titleToSlug(name));
  },[name, slugEdited]);

  const handleSave = () => { showToast('CHANGES SAVED'); setSaved(true); setTimeout(()=>setSaved(false),2000); };
  const handlePublish = () => showToast(isNew?'PROJECT CREATED':'PROJECT UPDATED');

  const seg_active = (s) => {
    if(status===s){
      if(s==='shipped') return 'seg-opt active-shipped';
      if(s==='wip') return 'seg-opt active-wip';
      return 'seg-opt active-archived';
    }
    return 'seg-opt';
  };

  return (
    <div className="editor-shell">
      {/* Editor Topbar */}
      <div className="editor-topbar">
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button className="btn btn-ghost btn-sm" onClick={onBack} style={{display:'flex',alignItems:'center',gap:5}}>
            <Ic d={IC.arrow_l} size={11}/> PROJECTS
          </button>
          <span style={{color:'var(--border-s)',fontFamily:"'JetBrains Mono'",fontSize:11}}>/</span>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--t2)'}}>
            {isNew?'NEW PROJECT':'EDITING'}
          </span>
          {!isNew && (
            <><span style={{color:'var(--border-s)',fontFamily:"'JetBrains Mono'",fontSize:11}}>/</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,letterSpacing:'.04em',color:'var(--t1)'}}>{name}</span></>
          )}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {live && (
            <button className="btn btn-ghost btn-sm" style={{display:'flex',alignItems:'center',gap:5}} onClick={e=>e.preventDefault()}>
              <Ic d={IC.ext} size={10}/> VIEW LIVE
            </button>
          )}
          {github && (
            <button className="btn btn-ghost btn-sm" style={{display:'flex',alignItems:'center',gap:5}} onClick={e=>e.preventDefault()}>
              <Ic d={IC.ext} size={10}/> GITHUB
            </button>
          )}
        </div>
      </div>

      <div className="editor-main">
        {/* Main content area */}
        <div className="editor-body">
          {/* Name */}
          <input
            className="editor-name-input"
            placeholder="Project name..."
            value={name}
            onChange={e=>setName(e.target.value)}
          />

          {/* Description */}
          <div className="field-section" style={{marginTop:24}}>
            <div className="field-label">Description <span style={{color:'var(--border-s)',fontWeight:400,letterSpacing:'.04em'}}>SHORT SUMMARY FOR LISTING</span></div>
            <textarea
              className="field-textarea sm"
              placeholder="One or two sentences describing what this project does and why you built it..."
              value={desc}
              onChange={e=>setDesc(e.target.value)}
              rows={3}
            />
          </div>

          <div className="section-divider"/>

          {/* Case study sections */}
          <div className="section-title">CASE STUDY</div>

          <div className="field-section">
            <div className="field-label">01 / Problem</div>
            <textarea
              className="field-textarea lg"
              placeholder="What problem were you solving? Why did it matter? Be specific about the gap you identified..."
              value={problem}
              onChange={e=>setProblem(e.target.value)}
            />
          </div>

          <div className="field-section">
            <div className="field-label">02 / Approach</div>
            <textarea
              className="field-textarea lg"
              placeholder="How did you build it? What key technical decisions did you make and why? What tradeoffs did you accept..."
              value={approach}
              onChange={e=>setApproach(e.target.value)}
            />
          </div>

          <div className="field-section">
            <div className="field-label">03 / What I Learned</div>
            <textarea
              className="field-textarea md"
              placeholder="What would you do differently? What surprised you? What became obvious only after shipping..."
              value={learned}
              onChange={e=>setLearned(e.target.value)}
            />
          </div>
        </div>

        {/* Right sidebar */}
        <div className="editor-sidebar">
          {/* Status */}
          <div className="esb-section">
            <span className="esb-label">Status</span>
            <div className="seg-ctrl">
              {['shipped','wip','archived'].map(s=>(
                <button key={s} className={seg_active(s)} onClick={()=>setStatus(s)}>
                  {s==='wip'?'WIP':s==='shipped'?'DONE':'ARCH'}
                </button>
              ))}
            </div>
            <div style={{marginTop:8,display:'flex',justifyContent:'center'}}>
              <span className={`badge badge-${status}`}>{status==='wip'?'IN PROGRESS':status.toUpperCase()}</span>
            </div>
          </div>

          {/* Slug */}
          <div className="esb-section">
            <span className="esb-label">Slug</span>
            <input
              className="esb-input"
              value={slug}
              onChange={e=>{setSlug(e.target.value);setSlugEdited(true);}}
              placeholder="project-slug"
            />
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--t3)',marginTop:5,letterSpacing:'.04em'}}>
              /projects/{slug||'—'}
            </div>
          </div>

          {/* Stack */}
          <div className="esb-section">
            <span className="esb-label">Stack</span>
            <TagInput tags={stack} onChange={setStack}/>
          </div>

          {/* Links */}
          <div className="esb-section">
            <span className="esb-label">Links</span>
            <div style={{marginBottom:10}}>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--t3)',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:5}}>GitHub</div>
              <input
                className="link-input"
                style={{width:'100%'}}
                value={github}
                onChange={e=>setGithub(e.target.value)}
                placeholder="https://github.com/..."
              />
            </div>
            <div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--t3)',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:5}}>Live URL</div>
              <input
                className="link-input"
                style={{width:'100%'}}
                value={live}
                onChange={e=>setLive(e.target.value)}
                placeholder="https://..."
              />
            </div>
          </div>

          {/* Metadata */}
          <div className="esb-section" style={{flex:1, background:'var(--bg)'}}>
            {[
              ['CREATED', isNew?'—':'Jan 2026'],
              ['UPDATED', isNew?'—':'Just now'],
              ['STACK SIZE', `${stack.length} tags`],
            ].map(([k,v])=>(
              <div className="esb-meta-row" key={k}>
                <span className="esb-meta-key">{k}</span>
                <span className="esb-meta-val">{v}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Bottom bar */}
      <div className="editor-bottom-bar">
        <button className="btn-danger-text" onClick={()=>showToast('PROJECT DELETED')}>DELETE PROJECT</button>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--t3)',letterSpacing:'.06em',textTransform:'uppercase',marginRight:8}}>
            {saved?'✓ SAVED':'UNSAVED CHANGES'}
          </span>
          <button className="btn btn-ghost" onClick={handleSave}>SAVE DRAFT</button>
          <button className="btn btn-primary" onClick={handlePublish}>
            {isNew?'CREATE PROJECT →':'UPDATE PROJECT →'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── APP ────────────────────────────────── */
function App(){
  const [screen, setScreen] = useState(()=>sessionStorage.getItem('proj_screen')||'list');
  const [editProj, setEditProj] = useState(null);
  const [toast, setToast] = useState(null);
  const showToast = useCallback(msg=>{setToast(null);setTimeout(()=>setToast(msg),10);},[]);

  const openEditor = (proj) => { setEditProj(proj); setScreen('editor'); sessionStorage.setItem('proj_screen','editor'); };
  const openNew = () => { setEditProj(null); setScreen('editor'); sessionStorage.setItem('proj_screen','editor'); };
  const goBack = () => { setScreen('list'); sessionStorage.setItem('proj_screen','list'); };

  return (
    <div className="shell">
      <Sidebar active="projects"/>
      <div className="main">
        {screen==='list' && (
          <div className="topbar">
            <div className="tb-title">
              <span>ADMIN</span><span className="tb-sep">/</span>
              <strong>UTKARSH PANCHAL</strong><span className="tb-sep">·</span>
              <span style={{color:'var(--t3)'}}>PROJECTS</span>
            </div>
            <div className="tb-right">
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--t3)'}}>LOGGED IN AS UP</span>
              <button className="tb-link">VIEW SITE ↗</button>
            </div>
          </div>
        )}
        {screen==='list' && <ProjectsList onEdit={openEditor} onNew={openNew} showToast={showToast}/>}
        {screen==='editor' && <ProjectEditor project={editProj} onBack={goBack} showToast={showToast}/>}
      </div>
      {toast && <Toast key={toast+Date.now()} msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
